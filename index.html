    /* ═══════════════ 共用小工具 ═══════════════ */
    function getItemName(key, lang = userLang) { return (dictionary.items[key] && dictionary.items[key][lang]) ? dictionary.items[key][lang] : key; }
    function getItemRatio(key) { return (dictionary.items[key] && dictionary.items[key].ratio) ? dictionary.items[key].ratio : 1; }
    function getItemUnit(key, lang = userLang) { return (dictionary.items[key] && dictionary.items[key].unit) ? dictionary.items[key].unit[lang] : ''; }

    /* 取得品項的實際圖片（沿用 v4.2.0 的 foodImgs/soupImgs 連結庫）；
       如果是新貨品沒有圖片（或只是佔位用的假連結），回傳 null，改用跑馬燈顯示名字 */
    function getItemImage(key) {
        const url = config.foodImgs[key] || config.soupImgs[key];
        if (!url || url.includes('placeholder')) return null;
        return url;
    }

    /* ═══════════════ ✨ 需求3：首次進入湯/面/小食分類時，右側隨機推薦4款可一按下單 ═══════════════ */

    /* 記住每個分類「這次停留期間」抽到的 4 款，避免同一次停留畫面中因為其他重繪
       （例如切換語言）而讓卡片內容一直跳動改變；離開分類再回來(selectCategory)才會重新抽 */
    let quickSuggestionCache = {};

    function getCategoryKeys(cat) {
        /* ✅ 缺貨的品項不進入隨機推薦名單，避免推薦客人現在買不到的東西 */
        if (cat === '湯') return Object.keys(config.soupImgs).filter(k => !isMenuItemSoldOut(k, cat));
        if (cat === '面') return Object.keys(config.foodImgs).filter(k => !isMenuItemSoldOut(k, cat));
        if (cat === '小食') return config.additions.map(a => a.key).filter(k => !isMenuItemSoldOut(k, cat));
        return [];
    }

    /* 小食的圖片存在 config.additions[].img，湯/面則沿用 getItemImage() 的來源 */
    function getAnyItemImage(key, cat) {
        if (cat === '小食') {
            const a = config.additions.find(x => x.key === key);
            return (a && a.img && !a.img.includes('placeholder')) ? a.img : null;
        }
        return getItemImage(key);
    }

    /* 小食走加料定價；湯/面走 config.prices 基本價（面食是「小份、面薄、辣椒」預設組合的價錢）*/
    function getSuggestionPrice(key, cat) {
        if (cat === '小食') return getAdditionPrice(key);
        return config.prices[key] || 0;
    }

    /* Fisher-Yates 洗牌，從 arr 隨機挑不重複的 n 個 */
    function pickRandom(arr, n) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [a[i], a[j]] = [a[j], a[i]];
        }
        return a.slice(0, n);
    }

    /* ✅ 需求2：麵食類的隨機推薦，除了主餐隨機外，麵種／醬料也一併隨機搭配，
       讓每次抽到的組合更多樣化，而不是每張卡都固定「面薄・辣椒」。
       若隨機到的麵種剛好是 SOUP_IMPLIES_NOODLES（米太目/冬粉/米粉），
       醬料會強制對應為「湯」，跟需求4的自動連動規則保持一致，不會出現「冬粉+辣椒」這種怪組合。*/
    function buildRandomNoodleAndSauce() {
        const noodleKeys = Object.keys(config.noodleTypeImgs);
        const noodleKey = noodleKeys[Math.floor(Math.random() * noodleKeys.length)];
        let sauceKey;
        if (SOUP_IMPLIES_NOODLES.includes(noodleKey)) {
            sauceKey = '湯';   // 與 setTempNoodle() 的自動連動規則一致
        } else {
            sauceKey = config.sauces[Math.floor(Math.random() * config.sauces.length)];
        }
        return { noodleKey, sauceKey };
    }

    function renderQuickSuggestionsHtml() {
        const cat = currentCategory;
        const keys = getCategoryKeys(cat);
        if (keys.length === 0) {
            return `<div class="empty-hint">👈 ${userLang==='zh' ? '請從左側選擇餐點開始點餐' : 'Select an item on the left to start.'}</div>`;
        }

        /* 快選快取現在存的是「完整組合物件」而不只是主餐 key：
           { key, noodleKey, sauceKey } —— 這樣畫面顯示的組合，跟按下去實際下單的組合保證一致 */
        if (!quickSuggestionCache[cat] || quickSuggestionCache[cat].length === 0) {
            const chosenKeys = pickRandom(keys, Math.min(4, keys.length));
            quickSuggestionCache[cat] = chosenKeys.map(key => {
                if (cat === '面') {
                    const { noodleKey, sauceKey } = buildRandomNoodleAndSauce();
                    return { key, noodleKey, sauceKey };
                }
                return { key };
            });
        }
        const picks = quickSuggestionCache[cat];
        const catLabel = cat==='湯' ? (userLang==='zh'?'湯品':'soup') : cat==='面' ? (userLang==='zh'?'麵食':'noodle') : (userLang==='zh'?'小食':'snack');

        return `<div style="font-weight:900; font-size:1.05rem; margin-bottom:4px;">✨ ${userLang==='zh'?`為你隨機推薦幾款${catLabel}`:`Suggested ${catLabel}`}</div>
        <div style="font-size:0.8rem; color:#999; margin-bottom:12px;">👈 ${userLang==='zh'?'或從左側完整清單選擇；點卡片可直接下單並列印':'Or pick from the full list on the left; tap a card to order & print instantly'}</div>
        <div class="hot-grid">${picks.map((pick, idx) => {
            const { key } = pick;
            const price = getSuggestionPrice(key, cat);
            const img = getAnyItemImage(key, cat);
            const mediaHtml = img
                ? `<div class="hot-img"><img src="${img}" alt="${getItemName(key)}" loading="lazy"></div>`
                : `<div class="hot-img hot-img-marquee"><span>${getItemName(key)}</span></div>`;
            /* ✅ 面食的說明文字改為顯示「這張卡實際隨機到」的麵種＋醬料組合（小份），而非固定文字 */
            const descText = cat === '面' ? `${getItemName(pick.noodleKey)}・${getItemName(pick.sauceKey)}（${userLang==='zh'?'小':'S'}）`
                            : cat === '小食' ? `${getItemRatio(key)}${getItemUnit(key)}`
                            : (userLang==='zh'?'湯底':'Soup base');
            return `<div class="hot-card">
                <div class="hot-card-top">
                    ${mediaHtml}
                    <div class="hot-card-body">
                        <div class="hot-rank">✨ ${userLang==='zh'?'隨機推薦':'Suggested'}</div>
                        <div class="hot-name">${getItemName(key)}</div>
                        <div class="hot-desc">${descText}</div>
                        <div class="hot-loc" style="background:var(--success);">🍽${userLang==='zh'?'堂食':'Dine-in'}</div>
                    </div>
                </div>
                <div class="hot-card-footer">
                    <div class="hot-price">$${price.toFixed(2)}</div>
                    <button class="hot-order-btn" onclick="quickSuggestOrder('${cat}', ${idx})">🛒 ${userLang==='zh'?'下單':'Order'}</button>
                </div>
            </div>`;
        }).join('')}</div>`;
    }

    /* 快選卡片一按下單：直接套用該卡片顯示的組合（麵食的麵種/醬料是該卡片抽到的隨機組合，
       跟畫面上顯示的完全一致），立刻結帳、記錄銷售並印出收據，行為與「人氣」榜的一鍵下單一致 */
    async function quickSuggestOrder(cat, idx) {
        const pick = quickSuggestionCache[cat][idx];
        const key = pick.key;
        let item;
        if (cat === '湯') {
            item = { mainKey: key, sizeKey: '小的', noodleKey: '湯品', sauceKeys: ['湯'], specialKeys: [], noExtraKeys: [], additionKeys: {}, qty: 1, category: '湯', isTakeaway: false };
        } else if (cat === '小食') {
            item = { mainKey: key, sizeKey: '', noodleKey: '', sauceKeys: [], specialKeys: [], noExtraKeys: [], additionKeys: {}, qty: 1, category: '小食', isTakeaway: false };
        } else {
            /* ✅ 用該卡片實際隨機到的麵種／醬料下單，跟畫面顯示的組合一致 */
            item = { mainKey: key, sizeKey: '小的', noodleKey: pick.noodleKey, sauceKeys: [pick.sauceKey], specialKeys: [], noExtraKeys: [], additionKeys: {}, qty: 1, category: '面', isTakeaway: false };
        }
        item.price = computeBasePrice(item.mainKey, item.sizeKey, item.category);

        const originalCart = [...cart];
        cart = [item];
        document.getElementById('cart-total-sum').innerText = item.price.toFixed(2);

        const orderInfo = await getNextOrderNo();   // ✅ 改用雲端共用流水號，同時取得 Firebase key
        const orderData = getOrderData();
        orderData.history.unshift({ num: orderInfo.no, key: orderInfo.key, total: item.price.toFixed(2), items: [JSON.parse(JSON.stringify(item))] });
        recordSale([item]);
        await saveOrderData(orderData);

        try {
            await handleFinalizeAndPrint(userLang, orderInfo, true, userLang==='zh' ? '✅ 已下單並列印！' : '✅ Ordered & Printed!');
        } catch (e) {
            alert("下單失敗: " + e.message);
        } finally {
            cart = originalCart;
            renderPanelCartSummary();
            updateBottomBar();
        }
    }

    function updateBottomBar() {
        let total = 0;
        cart.forEach(item => { total += item.price * item.qty + (item.isTakeaway ? 0.30 * item.qty : 0); });
        document.getElementById('cart-total-sum').innerText = total.toFixed(2);
        document.getElementById('cart-count').innerText = cart.length;
    }

    /* ═══════════════ 分類切換（步驟1：選品項的入口） ═══════════════ */
    function selectCategory(cat) {
        currentCategory = cat;
        tempItem = null; editingIndex = -1;
        document.querySelectorAll('.cat-tab').forEach(t => t.classList.toggle('active', t.dataset.cat === cat));
        /* ✅ 每次按下分類頁籤都清掉該分類的隨機快選快取，讓「隨機四個」每次進來都重新抽選 */
        delete quickSuggestionCache[cat];
        renderSideList();
        if (cat === '人氣') renderPopularityPanel();
        else renderPanelCartSummary();
    }

    function renderSideList() {
        const cont = document.getElementById('side-list');
        if (currentCategory === '人氣') { cont.innerHTML = ''; cont.style.display = 'none'; return; }
        cont.style.display = 'block';
        let keys, priceOf;
        if (currentCategory === '湯') { keys = Object.keys(config.soupImgs); priceOf = k => config.prices[k]; }
        else if (currentCategory === '面') { keys = Object.keys(config.foodImgs); priceOf = k => config.prices[k]; }
        else { keys = config.additions.map(a => a.key); priceOf = k => getAdditionPrice(k); } /* 小食：來源為加料清單 */
        const suffix = currentCategory==='面' ? (userLang==='zh'?' 起':'+') : '';
        const buildBtn = key => {
            const active = (tempItem && tempItem.mainKey === key && editingIndex === -1);
            /* ✅ 缺貨判斷：主理員標記為缺貨的品項顯示「缺貨」標籤、變灰、點下去只會提示不能選 */
            const soldOut = isMenuItemSoldOut(key, currentCategory);
            const clickHandler = soldOut
                ? `alert('${userLang==='zh' ? '目前缺貨中' : 'Currently sold out'}')`
                : `selectItem('${key}')`;
            const soldOutTag = soldOut ? `<span style="font-size:0.65rem; background:var(--price-tag,#d93025); color:#fff; font-weight:900; padding:1px 6px; border-radius:8px; margin-left:4px;">${userLang==='zh'?'缺貨':'Sold Out'}</span>` : '';
            return `<button class="side-item ${active ? 'active' : ''} ${soldOut ? 'side-item-soldout' : ''}" onclick="${clickHandler}">
                <span class="nm">${getItemName(key)}${soldOutTag}</span>
                <span class="pr">$${priceOf(key)}${suffix}</span>
            </button>`;
        };
        /* iPhone 上原本捲到底最後一項（如兒童餐）常被底部固定操作列擋住點不到，
           除了補上底部安全內距外，這裡結尾再重複一輪清單，捲動起來更順暢、不會卡在死角 */
        cont.innerHTML = keys.map(buildBtn).join('')
            + `<div class="side-loop-divider">🔁 ${userLang==='zh'?'從頭開始':'Back to top'}</div>`
            + keys.map(buildBtn).join('');
    }

    /* ═══════════════ 步驟2：點品項後立即帶入「快速預設值」，右側面板即時顯示 ═══════════════ */
    function selectItem(key) {
        editingIndex = -1;
        panelCollapse = { special: true, noExtra: true, additions: true };
        if (currentCategory === '湯') {
            /* 湯品類：完全比照原本邏輯，固定小份、湯品、湯底，不需另外選麵種/醬料 */
            tempItem = { mainKey: key, sizeKey: '小的', noodleKey: '湯品', sauceKeys: ['湯'], specialKeys: [], noExtraKeys: [], additionKeys: {}, qty: 1, category: '湯', isTakeaway: false };
        } else if (currentCategory === '小食') {
            /* 小食：加料區品項獨立販售，只需份數與堂食/外賣，單位跟原本加料的粒/條/片一致 */
            tempItem = { mainKey: key, sizeKey: '', noodleKey: '', sauceKeys: [], specialKeys: [], noExtraKeys: [], additionKeys: {}, qty: 1, category: '小食', isTakeaway: false };
        } else {
            /* 麵食類：預設「面薄、辣椒、小份、堂食」— 收銀員可直接按確認出收據，也可以再點一下修改 */
            tempItem = { mainKey: key, sizeKey: '小的', noodleKey: '面薄', sauceKeys: ['辣椒'], specialKeys: [], noExtraKeys: [], additionKeys: {}, qty: 1, category: '面', isTakeaway: false };
        }
        renderSideList();
        renderCustomizePanel();
    }

    /* 加料清單有自己的獨立定價（不在 config.prices 內），小食類別品項直接取用同一份定價 */
    function getAdditionPrice(key) {
        const a = config.additions.find(x => x.key === key);
        return a ? a.price : (config.prices[key] || 0);
    }
    function computeBasePrice(mainKey, sizeKey, category) {
        if (category === '小食') return getAdditionPrice(mainKey);
        return (config.prices[mainKey] || 0) + (config.prices[sizeKey] || 0);
    }

    /* 優惠折扣：西刀魚餅 買1個$1.8、買2個$3.5、買3個或以上每個$1.7（例如買3個=$5.1，如此類推）
       其餘加料品項維持原本「單價 x 數量」計算，不受影響 */
    function tieredUnitTotal(key, qty) {
        if (!qty || qty <= 0) return 0;
        if (key === '西刀魚餅') {
            if (qty === 1) return 1.8;
            if (qty === 2) return 3.5;
            return qty * 1.7;
        }
        return getAdditionPrice(key) * qty;
    }
    function computeAdditionsPrice(additionKeys) {
        let total = 0;
        Object.entries(additionKeys || {}).forEach(([k, v]) => { if (v > 0) total += tieredUnitTotal(k, v); });
        return total;
    }

    function computeTempUnitPrice(t) {
        let base = computeBasePrice(t.mainKey, t.sizeKey, t.category);
        base += computeAdditionsPrice(t.additionKeys);
        return base;
    }

    /* 目前只有西刀魚餅有買多折扣，未來如有其他品項也要打折，把 key 加進這裡即可 */
    function hasTieredPricing(key) { return key === '西刀魚餅'; }

    /* 統一的「總價」計算：小食類別若命中優惠品項，直接用級距總價（不是單價 x 數量），
       確保「加料」與「小食」兩邊算出來的西刀魚餅價錢完全同步 */
    function computeTempTotalPrice(t) {
        if (t.category === '小食' && hasTieredPricing(t.mainKey)) {
            return tieredUnitTotal(t.mainKey, t.qty) + (t.isTakeaway ? 0.30 * t.qty : 0);
        }
        const unitPrice = computeTempUnitPrice(t);
        return (unitPrice + (t.isTakeaway ? 0.30 : 0)) * t.qty;
    }

    function buildSummaryText(t) {
        const parts = [getItemName(t.mainKey)];
        if (t.category === '面') parts.push(`(${getItemName(t.sizeKey)}) ${getItemName(t.noodleKey)}`);
        if (t.category === '小食') parts.push(`${t.qty * getItemRatio(t.mainKey)}${getItemUnit(t.mainKey)}`);
        if (t.sauceKeys && t.sauceKeys.length) parts.push(t.sauceKeys.map(k=>getItemName(k)).join('/'));
        if (t.specialKeys && t.specialKeys.length) parts.push('★' + t.specialKeys.map(k=>getItemName(k)).join('/'));
        const adds = Object.entries(t.additionKeys||{}).filter(([k,v])=>v>0).map(([k,v])=>`${getItemName(k)}x${v}`);
        if (adds.length) parts.push('+' + adds.join(','));
        if (t.noExtraKeys && t.noExtraKeys.length) parts.push((userLang==='zh'?'不要:':'No:') + t.noExtraKeys.map(k=>getItemName(k)).join('/'));
        parts.push(t.isTakeaway ? '🥡' + (userLang==='zh'?'外賣':'Takeaway') : '🍽' + (userLang==='zh'?'堂食':'Dine-in'));
        return parts.join(userLang==='zh' ? '，' : ', ');
    }

    /* ── 這是整份改版的核心：所有客製選項一次攤平在同一畫面，不跳頁 ── */
    function renderCustomizePanel() {
        if (!tempItem) return;
        const t = tempItem;
        const totalPrice = computeTempTotalPrice(t);

        let html = `<div class="cz-header">
            <div class="cz-title">${getItemName(t.mainKey)}<small>${editingIndex >= 0 ? (userLang==='zh'?'修改購物車項目':'Editing cart item') : (userLang==='zh'?'新增品項（已套用快速預設值）':'New item (quick defaults applied)')}</small></div>
            <div class="cz-header-actions">
                ${editingIndex>=0 ? `<button class="mini-cancel" onclick="cancelEdit()">${userLang==='zh'?'✕ 取消':'✕ Cancel'}</button>` : ''}
                <button class="confirm-btn-top" onclick="confirmAddToCart()">✅ ${editingIndex>=0 ? (userLang==='zh'?'更新':'Update') : (userLang==='zh'?'加入':'Add')} $${totalPrice.toFixed(2)}</button>
            </div>
        </div>`;

        if (t.category === '面' || t.category === '湯') {
            html += `<div class="section"><div class="section-label">📏 ${userLang==='zh'?'大小':'Size'}</div>
                <div class="size-ta-row">
                    <div class="chip-row" style="margin:0;">
                        <button class="chip big ${t.sizeKey==='小的'?'selected':''}" onclick="setTempSize('小的')">${getItemName('小的')} $0</button>
                        <button class="chip big ${t.sizeKey==='大的'?'selected':''}" onclick="setTempSize('大的')">${getItemName('大的')} +$${config.prices['大的']}</button>
                    </div>
                    <button class="ta-toggle-btn ${t.isTakeaway?'active':''}" onclick="setTempLocation(${!t.isTakeaway})">
                        <span class="ta-toggle-track"><span class="ta-toggle-thumb"></span></span>
                        <span class="ta-toggle-text">(${userLang==='zh'?'外賣':'Takeaway'}+$0.3)</span>
                    </button>
                </div>
            </div>`;
        }

        if (t.category === '面') {
            html += `<div class="section"><div class="section-label">🍜 ${userLang==='zh'?'麵種':'Noodle Type'}</div><div class="chip-row">
                ${Object.keys(config.noodleTypeImgs).map(k => `<button class="chip ${t.noodleKey===k?'selected':''}" onclick="setTempNoodle('${k}')">${getItemName(k)}</button>`).join('')}
            </div></div>`;

            {
                /* ✅ 需求2：辣椒／湯各自獨立成左右兩側的大按鈕，其餘醬料放中間小格子 */
                const midSauces = config.sauces.filter(k => k !== '辣椒' && k !== '湯');
                html += `<div class="section"><div class="section-label">🌶 ${userLang==='zh'?'醬料（可複選）':'Sauce (multi)'}</div>
                <div class="sauce-layout">
                    <button class="sauce-side-btn ${t.sauceKeys.includes('辣椒')?'selected':''}" onclick="toggleTempSauce('辣椒')">${getItemName('辣椒')}</button>
                    <div class="sauce-mid-grid">
                        ${midSauces.map(k => `<button class="chip ${t.sauceKeys.includes(k)?'selected':''}" onclick="toggleTempSauce('${k}')">${getItemName(k)}</button>`).join('')}
                    </div>
                    <button class="sauce-side-btn soup-side ${t.sauceKeys.includes('湯')?'selected':''}" onclick="toggleTempSauce('湯')">${getItemName('湯')}</button>
                </div></div>`;
            }

            html += `<div class="section"><div class="section-label collapsible" onclick="toggleSection('special')">
                <span class="tri">${panelCollapse.special?'▶':'▼'}</span> ⚠️ ${userLang==='zh'?'特別要求':'Special Request'}
                ${t.specialKeys.length ? `<span class="sel-count">${userLang==='zh'?'已選':''} ${t.specialKeys.length}</span>` : ''}
            </div><div class="chip-row collapse-body ${panelCollapse.special?'closed':''}">
                ${config.specials.map(k => `<button class="chip warn ${t.specialKeys.includes(k)?'selected':''}" onclick="toggleTempSpecial('${k}')">${getItemName(k)}</button>`).join('')}
            </div></div>`;
        }

        if (t.category !== '小食') {
            html += `<div class="section"><div class="section-label collapsible" onclick="toggleSection('noExtra')">
                <span class="tri">${panelCollapse.noExtra?'▶':'▼'}</span> 🚫 ${userLang==='zh'?'不要什麼':'No Extras'}
                ${t.noExtraKeys.length ? `<span class="sel-count">${userLang==='zh'?'已選':''} ${t.noExtraKeys.length}</span>` : ''}
            </div><div class="chip-row collapse-body ${panelCollapse.noExtra?'closed':''}">
                ${Object.keys(config.noExtraImgs).map(k => `<button class="chip warn ${t.noExtraKeys.includes(k)?'selected':''}" onclick="toggleTempNoExtra('${k}')">${getItemName(k)}</button>`).join('')}
            </div></div>`;

            const addCount = Object.values(t.additionKeys||{}).reduce((s,v)=>s+(v>0?v:0),0);
            html += `<div class="section"><div class="section-label collapsible" onclick="toggleSection('additions')">
                <span class="tri">${panelCollapse.additions?'▶':'▼'}</span> ➕ ${userLang==='zh'?'加料':'Additions'}
                ${addCount ? `<span class="sel-count">${userLang==='zh'?'已選':''} ${addCount}</span>` : ''}
            </div><div class="collapse-body ${panelCollapse.additions?'closed':''}">
                ${config.additions.map(a => `<div class="qty-line"><span>${getItemName(a.key)} <span style="color:var(--add); font-weight:bold;">(+$${a.price})</span></span>
                    <div class="qty-ctrl"><button class="qty-btn2" onclick="changeTempAddQty('${a.key}',-1)">-</button><span class="qty-val2">${t.additionKeys[a.key]||0}</span><button class="qty-btn2" onclick="changeTempAddQty('${a.key}',1)">+</button></div>
                </div>`).join('')}
            </div></div>`;
        }

        html += `<div class="section" style="border-bottom:none;"><div class="section-label">🔢 ${userLang==='zh'?'份數':'Qty'}${t.category==='小食' ? ` (${userLang==='zh'?'單位':'unit'}: ${getItemUnit(t.mainKey)})` : ''}</div>
            <div class="qty-ctrl"><button class="qty-btn2" onclick="changeTempQty(-1)">-</button><span class="qty-val2">${t.qty}</span><button class="qty-btn2" onclick="changeTempQty(1)">+</button></div>
        </div>`;

        html += `<div class="summary-box">📋 ${buildSummaryText(t)}</div>`;

        document.getElementById('panel').innerHTML = html;
    }

    function setTempSize(v) { tempItem.sizeKey = v; renderCustomizePanel(); }
    /* ✅ 需求4：這幾種麵種幾乎都是湯底吃法，選到時自動幫忙選好「湯」醬料，
       減少每次都要多點一下的麻煩；使用者仍可以自行改回其他醬料，並非強制鎖定。
       這份清單同時也給「隨機推薦」(quickSuggestion) 共用，確保兩處行為一致。*/
    const SOUP_IMPLIES_NOODLES = ['米太目', '冬粉', '米粉'];

    function setTempNoodle(v) {
        tempItem.noodleKey = v;
        if (SOUP_IMPLIES_NOODLES.includes(v)) {
            tempItem.sauceKeys = ['湯'];   // 自動連動選湯，與 toggleTempSauce('湯') 效果一致
        }
        renderCustomizePanel();
    }
    /* 醬料互斥狀態機：
       (A) 「湯」與任何其他醬料互斥 —— 按下湯，其他全部清空；按下任何其他醬料，湯自動取消
       (B) 「辣椒／少辣／多辣」三個是單選(Radio) —— 選其中一個，另外兩個自動回復未選 */
    const SPICE_LEVELS = ['辣椒', '少辣', '多辣'];
    function toggleTempSauce(k) {
        const wasSelected = tempItem.sauceKeys.includes(k);
        if (k === '湯') {
            tempItem.sauceKeys = wasSelected ? [] : ['湯'];
        } else {
            tempItem.sauceKeys = tempItem.sauceKeys.filter(x => x !== '湯');  /* 選其他醬料，湯自動取消 */
            if (SPICE_LEVELS.includes(k)) {
                tempItem.sauceKeys = tempItem.sauceKeys.filter(x => !SPICE_LEVELS.includes(x));  /* 辣度單選，先清空另外兩個 */
                if (!wasSelected) tempItem.sauceKeys.push(k);
            } else {
                const idx = tempItem.sauceKeys.indexOf(k);
                if (idx >= 0) tempItem.sauceKeys.splice(idx, 1); else tempItem.sauceKeys.push(k);
            }
        }
        renderCustomizePanel();
    }
    function toggleSection(name) { panelCollapse[name] = !panelCollapse[name]; renderCustomizePanel(); }
    function toggleTempSpecial(k) { const i = tempItem.specialKeys.indexOf(k); if (i>=0) tempItem.specialKeys.splice(i,1); else tempItem.specialKeys.push(k); renderCustomizePanel(); }
    function toggleTempNoExtra(k) { const i = tempItem.noExtraKeys.indexOf(k); if (i>=0) tempItem.noExtraKeys.splice(i,1); else tempItem.noExtraKeys.push(k); renderCustomizePanel(); }
    function changeTempAddQty(k, d) { tempItem.additionKeys[k] = Math.max(0, (tempItem.additionKeys[k]||0) + d); renderCustomizePanel(); }
    function setTempLocation(isTA) { tempItem.isTakeaway = isTA; renderCustomizePanel(); }
    function changeTempQty(d) { tempItem.qty = Math.max(1, tempItem.qty + d); renderCustomizePanel(); }

    /* ═══════════════ 加入購物車 / 取消修改 ═══════════════ */
    function confirmAddToCart() {
        if (!tempItem) return;

        /* 麵食類 + 外賣 + 選了「湯」醬料 → 詢問是否分湯（湯另外包裝）
           選「是」→ 加註備註，會印在收據上；選「否」→ 不加註，收據上不會多印這行 */
        if (tempItem.category === '面' && tempItem.isTakeaway && tempItem.sauceKeys.includes('湯')) {
            const wantsSplit = confirm(userLang === 'zh'
                ? '這份是外賣湯麵，是否需要「分湯」（湯與麵分開包裝）？'
                : 'This is a takeaway soup noodle. Separate the soup from the noodles?');
            const idx = tempItem.specialKeys.indexOf('分開湯');
            if (wantsSplit) { if (idx < 0) tempItem.specialKeys.push('分開湯'); }
            else { if (idx >= 0) tempItem.specialKeys.splice(idx, 1); }
        }

        /* 一般狀況：item.price 是「單價」，之後畫面/收據都用 price x qty 計算；
           但西刀魚餅買多有折扣、不是單純倍數，所以存入購物車時改存「這批數量換算出來的等效單價」，
           讓 price x qty 依然等於正確的級距總價（例：3個共$5.1，等效單價=5.1/3=1.7） */
        let unitPrice;
        if (tempItem.category === '小食' && hasTieredPricing(tempItem.mainKey)) {
            unitPrice = tieredUnitTotal(tempItem.mainKey, tempItem.qty) / tempItem.qty;
        } else {
            unitPrice = computeTempUnitPrice(tempItem);
        }
        const finalItem = {
            ...tempItem, price: unitPrice,
            sauceKeys: [...tempItem.sauceKeys], specialKeys: [...tempItem.specialKeys],
            noExtraKeys: [...tempItem.noExtraKeys], additionKeys: {...tempItem.additionKeys}
        };
        const wasEditing = editingIndex >= 0;
        const addedMainKey = tempItem.mainKey;
        if (wasEditing) { cart[editingIndex] = finalItem; editingIndex = -1; }
        else cart.push(finalItem);
        renderSideList();
        updateBottomBar();
        const modal = document.getElementById('cart-view-modal');
        if (modal.style.display === 'flex') document.getElementById('cart-modal-body').innerHTML = buildCartRowsHtml();

        if (wasEditing) {
            /* 修改既有購物車項目：完成後回到購物車總覽，方便核對整體內容 */
            tempItem = null;
            renderPanelCartSummary();
        } else {
            /* 新增品項：停留在同一個自訂面板，重置回該品項的預設值，方便馬上點下一份（同一道菜也可以再選別的做法）
               並跳出「已加入」小提示，讓收銀員清楚知道剛剛真的有加入成功 */
            showAddedToast();
            selectItem(addedMainKey);
        }
    }

    let addedToastTimer = null;
    function showAddedToast() {
        const el = document.getElementById('added-toast');
        el.textContent = userLang === 'zh' ? '✅ 已加入購物車' : '✅ Added to cart';
        el.classList.add('show');
        clearTimeout(addedToastTimer);
        addedToastTimer = setTimeout(() => el.classList.remove('show'), 1200);
    }

    function cancelEdit() { tempItem = null; editingIndex = -1; renderSideList(); renderPanelCartSummary(); }

    /* ═══════════════ 購物車面板（右側面板在「沒有正在自訂品項」時的預設畫面） ═══════════════ */
    /* 抽出共用的購物車列表 HTML，右側主面板與「查看購物車」彈窗都用同一份，避免重複維護 */
    function buildCartRowsHtml() {
        if (cart.length === 0) {
            return `<div class="empty-hint">👈 ${userLang==='zh' ? '請從左側選擇餐點開始點餐<br>（點擊後會自動套用常用預設值，確認即可送出）' : 'Select an item on the left to start.<br>Quick defaults are applied automatically.'}</div>`;
        }
        return cart.map((item, idx) => {
            const fee = item.isTakeaway ? 0.30 * item.qty : 0;
            const line = item.price * item.qty + fee;
            const adds = Object.entries(item.additionKeys||{}).filter(([k,v])=>v>0).map(([k,v])=>`${getItemName(k)}(${v*getItemRatio(k)}${getItemUnit(k)})`).join(', ');
            const locTag = item.isTakeaway ? `<span class="loc-tag ta">🥡外賣 +$${fee.toFixed(2)}</span>` : `<span class="loc-tag di">🍽堂食</span>`;
            return `<div class="cart-item"><div class="cart-row"><div class="cart-info">
                <div style="font-weight:900; font-size:1.05rem;">${idx+1}. ${getItemName(item.mainKey)}${locTag}</div>
                ${item.category==='面' ? `<div style="font-size:0.9rem; color:#333; font-weight:bold;">[${getItemName(item.sizeKey)}] ${getItemName(item.noodleKey)} ${item.sauceKeys.map(k=>getItemName(k)).join(', ')}</div>` : ''}
                ${item.category==='小食' ? `<div style="font-size:0.9rem; color:#333; font-weight:bold;">${item.qty*getItemRatio(item.mainKey)}${getItemUnit(item.mainKey)}</div>` : ''}
                ${item.specialKeys && item.specialKeys.length ? `<div style="color:#f57c00; font-weight:900;">★ ${item.specialKeys.map(k=>getItemName(k)).join(', ')}</div>` : ''}
                ${adds ? `<div style="color:var(--add); font-weight:bold;">+ ${adds}</div>` : ''}
                ${item.noExtraKeys && item.noExtraKeys.length ? `<div style="color:red;">[不要: ${item.noExtraKeys.map(k=>getItemName(k)).join(', ')}]</div>` : ''}
                <div style="font-weight:bold; color:var(--price-tag);">$${line.toFixed(2)}</div>
                </div><div class="cart-ctrls">
                <div style="display:flex; align-items:center; background:#eee; border-radius:10px;"><button class="qty-btn" onclick="changeCartQty(${idx},-1)">-</button><span style="padding:0 10px; font-weight:bold;">${item.qty}</span><button class="qty-btn" onclick="changeCartQty(${idx},1)">+</button></div>
                <button class="edit-btn" onclick="editCartLine(${idx})">${userLang==='zh'?'修改':'Edit'}</button></div></div></div>`;
        }).join('');
    }

    function renderPanelCartSummary() {
        const panel = document.getElementById('panel');
        /* ✅ 需求3：購物車還空的時候，若目前在湯/面/小食分類，改顯示隨機挑選的4款快選卡片
           （可一按下單），取代原本純文字的空白提示；「人氣」分類與購物車彈窗維持原樣不變 */
        if (cart.length === 0) {
            panel.innerHTML = (currentCategory === '湯' || currentCategory === '面' || currentCategory === '小食')
                ? renderQuickSuggestionsHtml()
                : buildCartRowsHtml();
            return;
        }
        panel.innerHTML = `<div style="font-weight:900; font-size:1.15rem; margin-bottom:10px;">🛒 ${userLang==='zh'?'購物車明細':'Cart Details'}</div>${buildCartRowsHtml()}`;
    }

    /* ── 查看購物車彈窗：不管目前面板是不是正在自訂某個品項，都能隨時彈出看目前購物車內容 ── */
    function showCartModal() {
        document.getElementById('cart-modal-body').innerHTML = buildCartRowsHtml();
        document.getElementById('cart-view-modal').style.display = 'flex';
    }
    function closeCartModal() { document.getElementById('cart-view-modal').style.display = 'none'; }

    /* 統一刷新：購物車有變動時呼叫，會視情況更新主面板／彈窗，不會打斷正在自訂中的品項面板 */
    function refreshCartViews() {
        updateBottomBar();
        if (!tempItem) renderPanelCartSummary();
        const modal = document.getElementById('cart-view-modal');
        if (modal.style.display === 'flex') document.getElementById('cart-modal-body').innerHTML = buildCartRowsHtml();
    }

    function changeCartQty(idx, d) {
        const item = cart[idx];
        if (item.qty + d < 1) { if (confirm(userLang==='zh'?'移除此項？':'Remove?')) cart.splice(idx, 1); }
        else {
            item.qty += d;
            /* 購物車內直接調整份數時，若為套用級距折扣的小食（如西刀魚餅），重新換算等效單價 */
            if (item.category === '小食' && hasTieredPricing(item.mainKey)) {
                item.price = tieredUnitTotal(item.mainKey, item.qty) / item.qty;
            }
        }
        refreshCartViews();
    }

    function editCartLine(idx) {
        closeCartModal();
        tempItem = JSON.parse(JSON.stringify(cart[idx]));
        editingIndex = idx;
        currentCategory = tempItem.category;
        panelCollapse = {
            special: !(tempItem.specialKeys && tempItem.specialKeys.length),
            noExtra: !(tempItem.noExtraKeys && tempItem.noExtraKeys.length),
            additions: !Object.values(tempItem.additionKeys || {}).some(v => v > 0)
        };
        document.querySelectorAll('.cat-tab').forEach(t => t.classList.toggle('active', t.dataset.cat === currentCategory));
        renderSideList();
        renderCustomizePanel();
    }

    function clearWholeOrder(force = false) {
        if (!force && cart.length > 0 && !confirm(userLang==='zh' ? '確定清空目前購物車？' : 'Clear the current cart?')) return;
        cart = []; tempItem = null; editingIndex = -1;
        closeCartModal();
        renderSideList();
        renderPanelCartSummary();
        updateBottomBar();
    }

    /* ═══════════════ 🔥 人氣：當日銷售 TOP6，一鍵下單並直接列印 ═══════════════ */
    function renderPopularityPanel() {
        const panel = document.getElementById('panel');
        const combos = getTopCombos(6);
        if (combos.length === 0) {
            panel.innerHTML = `<div class="empty-hint">🔥 ${userLang==='zh' ? '今日尚無銷售紀錄<br>累積訂單後，最熱賣的 6 款餐點會自動出現在這裡' : 'No sales recorded yet today.<br>Top 6 best sellers will appear here automatically.'}</div>`;
            return;
        }
        panel.innerHTML = `<div style="font-weight:900; font-size:1.15rem; margin-bottom:12px;">🔥 ${userLang==='zh'?'今日人氣 TOP 6（點一下＝直接下單並列印）':'Today Top 6 (tap = order & print instantly)'}</div>
        <div class="hot-grid">${combos.map((c, i) => {
            const base = computeBasePrice(c.mainKey, c.sizeKey, c.category);
            let extra = computeAdditionsPrice(c.additionKeys);
            const price = base + extra + (c.isTakeaway ? 0.30 : 0);
            const noodleText = c.category === '面' ? getItemName(c.noodleKey) : '';
            const sauceText = c.sauceKeys.map(k=>getItemName(k)).join('/');
            const snackText = c.category === '小食' ? `${getItemRatio(c.mainKey)}${getItemUnit(c.mainKey)}` : '';
            const img = getItemImage(c.mainKey);
            /* 左側圖片用 <img object-fit:contain>，確保縮小後仍完整顯示整張照片，不會像背景圖那樣被裁掉一半 */
            const mediaHtml = img
                ? `<div class="hot-img"><img src="${img}" alt="${getItemName(c.mainKey)}" loading="lazy"></div>`
                : `<div class="hot-img hot-img-marquee"><span>${getItemName(c.mainKey)}</span></div>`;
            /* ✅ 熱銷品項若被主理員標記缺貨，統計數字照樣顯示（維持真實銷售紀錄），
               但下單按鈕會停用並顯示「缺貨」，不會讓客人點到買不到的東西 */
            const soldOut = isMenuItemSoldOut(c.mainKey, c.category);
            const orderBtn = soldOut
                ? `<button class="hot-order-btn" style="background:#bbb;" disabled>${userLang==='zh'?'缺貨中':'Sold Out'}</button>`
                : `<button class="hot-order-btn" onclick="quickOrderCombo(${i})">🛒 ${userLang==='zh'?'下單':'Order'}</button>`;
            return `<div class="hot-card ${soldOut ? 'hot-card-soldout' : ''}">
                <div class="hot-card-top">
                    ${mediaHtml}
                    <div class="hot-card-body">
                        <div class="hot-rank">${c.isDefault ? `⭐ No.${i+1} · ${userLang==='zh'?'熱門推薦':'Recommended'}` : `🔥 No.${i+1} · ${userLang==='zh'?'今日售出':'sold'} ${c.count} ${userLang==='zh'?'份':''}`}</div>
                        <div class="hot-name">${getItemName(c.mainKey)}${c.category==='面' ? ` (${getItemName(c.sizeKey)})` : ''}</div>
                        <div class="hot-desc">${noodleText} ${sauceText} ${snackText}</div>
                        <div class="hot-loc" style="background:${c.isTakeaway?'var(--takeaway)':'var(--success)'};">${c.isTakeaway?'🥡外賣':'🍽堂食'}</div>
                    </div>
                </div>
                <div class="hot-card-footer">
                    <div class="hot-price">$${price.toFixed(2)}</div>
                    ${orderBtn}
                </div>
            </div>`;
        }).join('')}</div>`;
    }

    async function quickOrderCombo(i) {
        const combos = getTopCombos(6);
        const c = combos[i];
        if (!c) return;
        if (isMenuItemSoldOut(c.mainKey, c.category)) { alert(userLang==='zh' ? '目前缺貨中' : 'Currently sold out'); return; }
        let base = computeBasePrice(c.mainKey, c.sizeKey, c.category);
        let extra = computeAdditionsPrice(c.additionKeys);
        const item = {
            mainKey: c.mainKey, sizeKey: c.sizeKey, noodleKey: c.noodleKey, sauceKeys: [...c.sauceKeys],
            specialKeys: [...c.specialKeys], noExtraKeys: [...c.noExtraKeys], additionKeys: {...c.additionKeys},
            price: base + extra, qty: 1, category: c.category, isTakeaway: c.isTakeaway
        };
        const originalCart = [...cart];
        cart = [item];
        const totalWithFee = item.price + (item.isTakeaway ? 0.30 : 0);
        document.getElementById('cart-total-sum').innerText = totalWithFee.toFixed(2);

        const orderInfo = await getNextOrderNo();   // ✅ 改用雲端共用流水號，同時取得 Firebase key
        const orderData = getOrderData();
        orderData.history.unshift({ num: orderInfo.no, key: orderInfo.key, total: totalWithFee.toFixed(2), items: [JSON.parse(JSON.stringify(item))] });
        recordSale([item]);
        await saveOrderData(orderData);

        try {
            await handleFinalizeAndPrint(userLang, orderInfo, true, userLang==='zh' ? '✅ 已下單並列印！' : '✅ Ordered & Printed!');
        } catch (e) {
            alert("一鍵下單失敗: " + e.message);
        } finally {
            cart = originalCart;
            renderPanelCartSummary();
            updateBottomBar();
            renderPopularityPanel();
        }
    }

    /* ═══════════════ 語言切換 ═══════════════ */
    function setLang(l) {
        userLang = l;
        document.querySelectorAll('#lang-toggle button').forEach(b => b.classList.toggle('active', b.dataset.lang === l));
        document.querySelectorAll('.cat-tab').forEach(t => {
            const cat = t.dataset.cat;
            t.innerText = cat==='湯' ? (l==='zh'?'🍜 湯品類':'🍜 Soup') : cat==='面' ? (l==='zh'?'🍝 麵食類':'🍝 Noodle') : cat==='小食' ? (l==='zh'?'🍡 小食':'🍡 Snacks') : (l==='zh'?'🔥 人氣':'🔥 Popular');
        });
        renderSideList();
        if (tempItem) renderCustomizePanel();
        else if (currentCategory === '人氣') renderPopularityPanel();
        else renderPanelCartSummary();
        updateBottomBar();
    }

    /* ═══════════════ 初始化 ═══════════════ */
    window.addEventListener('DOMContentLoaded', async () => {
        await loadCloudMenu();   /* ✅ 開機時先讀取主理員設定的最新菜單，再渲染畫面 */
        selectCategory('人氣');   /* 首次開啟直接顯示人氣推薦，不再是空白畫面 */
        updateBottomBar();
    });

</script>
</body>
</html>
