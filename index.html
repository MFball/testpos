<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Million FishBall Noodle - ver 3.5.1</title>
    
    <style>
        :root { 
            --primary: #1a73e8; --secondary: #f0f2f5; --success: #34a853; 
            --price-tag: #d93025; --add: #673ab7; --bg-white: #ffffff; 
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, sans-serif; background: var(--secondary); margin: 0; padding: 10px; user-select: none; }

        .container { 
            max-width: 600px; margin: auto; background: var(--bg-white); 
            padding: 15px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            padding-bottom: 150px; min-height: 95vh; position: relative; 
        }

        #status-bar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px 12px; background: #fff; border-radius: 12px; margin-bottom: 10px;
            font-size: 11px; font-weight: bold; border: 1px solid #eee;
        }
        #status-text { color: #d93025; }

        .step { display: none; animation: fadeIn 0.3s ease; }
        .step.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .back-btn-top { 
            position: absolute; left: 15px; top: 15px; width: 40px; height: 40px; 
            border-radius: 50%; background: #eee; border: none; font-size: 22px; z-index: 100;
        }

        h2 { 
            color: #202124; font-size: 1.15rem; margin: 35px 0 15px 0; 
            border-left: 6px solid var(--primary); padding-left: 12px; font-weight: 900; 
        }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

        .opt { 
            background: #fff; border: 2.5px solid #f1f3f4; border-radius: 16px; 
            cursor: pointer; position: relative; display: flex; flex-direction: column; 
            overflow: hidden; min-height: 160px; text-align: center;
        }
        .opt.selected { border-color: var(--primary); background: #f1f8ff; }

        .img-box { width: 100%; height: 110px; background: #fafafa; display: flex; justify-content: center; align-items: center; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }

        .price-circle { 
            position: absolute; top: 5px; right: 5px; background: var(--price-tag); 
            color: white; min-width: 42px; height: 32px; border-radius: 16px; 
            display: flex; align-items: center; justify-content: center; padding: 0 5px;
            font-size: 0.8rem; font-weight: bold; border: 2.2px solid white; 
        }

        .qty-input-overlay { 
            background: #fcfcfc; display: flex; justify-content: center; align-items: center;
            padding: 8px 2px; border-top: 1px solid #eee; gap: 10px;
        }
        .qty-row { display: flex; flex-direction: column; align-items: center; font-size: 0.85rem; font-weight: bold; flex: 1; }
        .qty-btn { width: 34px; height: 34px; border-radius: 8px; border: 1px solid #ccc; background: white; color: var(--primary); font-weight: bold; font-size: 1.2rem; display:flex; align-items:center; justify-content:center; }
        .qty-val { font-size: 1.1rem; margin: 0 8px; min-width: 20px; display: inline-block; }

        .nav-btns { 
            position: fixed; bottom: 0; left: 0; right: 0; background: white; 
            padding: 15px 12px 25px 12px; display: flex; gap: 10px; 
            max-width: 600px; margin: auto; box-shadow: 0 -5px 15px rgba(0,0,0,0.08); z-index: 1000; 
        }
        .main-action { flex: 1; padding: 18px 5px; border-radius: 12px; border: none; font-size: 1.1rem; cursor: pointer; font-weight: 900; color: white; }

        .sauce-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .sauce-btn { padding: 15px 2px; border: 2.2px solid #eee; border-radius: 12px; background: white; font-weight: 900; font-size: 0.85rem; }
        .sauce-btn.selected { border-color: var(--primary); background: #e8f0fe; color: var(--primary); }

        .special-box { background: #fff8e1; padding: 12px; border-radius: 16px; border: 1.5px dashed #ffe082; margin-top: 15px; }

        .cart-item { border-bottom: 2px solid #eee; padding: 15px 0; text-align: left; }
        .cart-row { display: flex; justify-content: space-between; align-items: flex-start; }
        .cart-info { flex: 1; padding-right: 10px; }
        .cart-ctrls { display: flex; flex-direction: column; align-items: flex-end; gap: 10px; }
        
        canvas { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="status-bar">
        <span>MILLION 麵店 v3.5.1</span>
        <span id="status-text">● 藍牙待機中</span>
    </div>

    <div class="step active" id="step-lang">
        <div style="text-align: center; margin-top: 40px;">
            <img src="https://i.ibb.co/TMFvjFRN/Minced.png" style="width: 120px; border-radius: 50%;">
            <h2 style="border:none; margin-top:10px; text-align:center;">Million FishBall Noodle</h2>
        </div>
        <div style="display: flex; flex-direction: column; gap: 20px; margin-top: 30px; padding: 0 20px;">
            <button style="height:100px; font-size:1.8rem; font-weight:900; border-radius:24px; border:4px solid #eee; background:white;" onclick="selectLanguage('zh')">中文 (繁體)</button>
            <button style="height:100px; font-size:1.8rem; font-weight:900; border-radius:24px; border:4px solid #eee; background:white;" onclick="selectLanguage('en')">English</button>
        </div>
    </div>

    <div class="step" id="step-start">
        <h2 id="t-select-cat">1. 請選擇類別</h2>
        <div class="grid">
            <div class="opt" onclick="setCategory('湯')">
                <div class="img-box"><img src="https://lh3.googleusercontent.com/pw/AP1GczOoXizYOs7TlJVh_ikXpPT_8uSFOyH2mnDMFvu2CIFXpJVYqNssfvAbgkwksOqIi89J0NAktQdtJStc5KB6YPkxqk0ccWLkjKAGWKILKERYMt_PYsI=w2400?source=screenshot.guru"></div>
                <span id="t-cat-soup" style="padding:10px; font-weight:bold;">湯品類</span>
            </div>
            <div class="opt" onclick="setCategory('面')">
                <div class="img-box"><img src="https://lh3.googleusercontent.com/pw/AP1GczM1EgErnLz57PZ0ckyDapaXUx27rggwr5VvU49Yo1vpygNeiLiTCVK6nGMT7UewX9jWyWN7Q04y5g8QeGtKBFBtYod8YZd1L42sFsRuRCpY2EvidrI=w2400?source=screenshot.guru"></div>
                <span id="t-cat-noodle" style="padding:10px; font-weight:bold;">麵食類</span>
            </div>
        </div>
    </div>

    <div class="step" id="step-soup-select">
        <button class="back-btn-top" onclick="goNext('step-start')">←</button>
        <h2 id="t-select-soup" style="margin-left: 55px;">2. 請選擇湯品</h2>
        <div class="grid" id="grid-soupItems"></div>
    </div>

    <div class="step" id="step-food-select">
        <button class="back-btn-top" onclick="goNext('step-start')">←</button>
        <h2 id="t-select-food" style="margin-left: 55px;">2. 選擇麵食與數量</h2>
        <div class="grid" id="grid-foodItems"></div>
        <div class="nav-btns">
            <button class="main-action" style="background:var(--primary)" onclick="checkFoodFlow()" id="btn-next-assign">下一步</button>
        </div>
    </div>

    <div class="step" id="step-noodle-type">
        <button class="back-btn-top" onclick="goNext('step-food-select')">←</button>
        <div id="assign-title" style="background:#e3f2fd; color:#0d47a1; padding:12px; border-radius:12px; margin-bottom:12px; font-weight:900; text-align:center;"></div>
        <h2 id="t-select-noodle" style="margin-left: 55px;">3. 請選擇麵種</h2>
        <div class="grid" id="grid-noodleType"></div>
    </div>

    <div class="step" id="step-sauce-select">
        <button class="back-btn-top" onclick="handleSauceBack()">←</button>
        <h2 id="t-select-sauce" style="margin-left: 55px;">4. 選擇醬料與要求</h2>
        <div id="sauce-cont" class="sauce-grid"></div>
        <div class="special-box">
            <div id="t-special-label" style="font-weight:900; font-size:0.9rem; color:#f57c00; margin-bottom:10px;">特別要求：</div>
            <div id="special-cont" class="grid" style="grid-template-columns: 1fr 1fr; gap: 8px;"></div>
        </div>
        <div class="nav-btns">
            <button class="main-action" style="background:var(--primary)" onclick="checkSauceFlow()" id="btn-sauce-next">下一步</button>
        </div>
    </div>

    <div class="step" id="step-no-extra">
        <button class="back-btn-top" onclick="handleNoExtraBack()">←</button>
        <h2 id="t-select-no" style="margin-left: 55px;">5. 不要什麼？</h2>
        <div class="grid" id="grid-noExtra"></div>
        <div class="nav-btns">
            <button class="main-action" style="background:var(--primary)" onclick="goNext('step-additions')" id="btn-no-next">下一步</button>
        </div>
    </div>
    
    <div class="step" id="step-additions">
        <button class="back-btn-top" onclick="goNext('step-no-extra')">←</button>
        <h2 id="t-select-add" style="margin-left: 55px;">6. 加料區</h2>
        <div class="grid" id="grid-additions"></div>
        <div class="nav-btns">
            <button class="main-action" style="background:var(--success)" onclick="confirmOneItem()" id="btn-confirm-item">✅ 確定此份</button>
        </div>
    </div>

    <div class="step" id="step-finish">
        <h2 id="t-cart-title" style="text-align:center; border:none;">🛒 購物車明細</h2>
        <div id="order-no-display" style="text-align:center; font-weight:900; color:#555; margin-bottom:10px;"></div>
        <div id="cart-list-cont" style="border: 2px solid #ddd; border-radius: 18px; padding: 15px; background: #fff;"></div>
        <div style="font-size: 2.2rem; color: var(--price-tag); font-weight: 900; margin: 25px 0; text-align: center;">
            <span id="t-total">總計</span>: $<span id="cart-total-sum">0.00</span>
        </div>
        <div class="nav-btns">
            <button class="main-action" style="background:var(--price-tag)" onclick="clearWholeOrder()" id="btn-clear">❌ 清空</button>
            <button class="main-action" style="background:var(--add)" onclick="goNext('step-start')" id="btn-continue">➕ 繼續</button>
            <button class="main-action" style="background:var(--primary)" id="printBtn" onclick="askPrintLanguage()">🖨️ 確認列印</button>
        </div>
    </div>
</div>

<canvas id="printCanvas" width="384"></canvas>

<script>
    // --- 基礎設定 ---
    const START_NO = 8238;
    let savedDevice = null, savedCharacteristic = null, isFastMode = false;
    let userLang = 'zh'; 
    let cart = [], session = { category: '', sequence: [], currentIdx: 0 }, mainCounts = {}; 
    let tempItem = { mainKey:'', sizeKey:'', noodleKey: '', sauceKeys: [], specialKeys: [], noExtraKeys: [], additionKeys: {}, price: 0, qty: 1 };

    // --- 單號管理 ---
    function getOrderData() { 
        const today = new Date().toLocaleDateString(); 
        let data = JSON.parse(localStorage.getItem('million_order_data')) || { date: today, num: START_NO }; 
        if (data.date !== today) { data.date = today; data.num = START_NO; } 
        return data; 
    }
    function saveOrderData(data) { localStorage.setItem('million_order_data', JSON.stringify(data)); }

    // --- 藍牙連線 ---
    async function getPrinter() {
        if (savedDevice && savedDevice.gatt.connected && savedCharacteristic) return savedCharacteristic;
        document.getElementById('status-text').innerText = "🔍 搜尋印表機...";
        try {
            savedDevice = await navigator.bluetooth.requestDevice({ 
                acceptAllDevices: true, 
                optionalServices: ['0000ffe0-0000-1000-8000-00805f9b34fb'] 
            });
            const server = await savedDevice.gatt.connect();
            const services = await server.getPrimaryServices();
            for (const s of services) {
                const chars = await s.getCharacteristics();
                savedCharacteristic = chars.find(c => c.properties.writeWithoutResponse) || chars.find(c => c.properties.write);
                if (savedCharacteristic) { isFastMode = !!chars.find(c => c.properties.writeWithoutResponse); break; }
            }
            document.getElementById('status-text').innerText = "● 藍牙已連線";
            document.getElementById('status-text').style.color = "#34a853";
            return savedCharacteristic;
        } catch (e) {
            document.getElementById('status-text').innerText = "❌ 未連線";
            document.getElementById('status-text').style.color = "#d93025";
            throw e;
        }
    }

    // --- 詢問列印語言 ---
    function askPrintLanguage() {
        if (cart.length === 0) return;
        const choice = confirm("請選擇列印語言 / Select Print Language:\n\n【確定/OK】 = 中文簡體 (Simplified Chinese)\n【取消/Cancel】 = English");
        const printLang = choice ? 'zh' : 'en';
        handleFinalizeAndPrint(printLang);
    }

    // --- 列印排版 (完全依照 2.9.9 字體大小，並加入多語言切換) ---
    function drawPrintCanvas(orderNo, printLang) {
        const canvas = document.getElementById('printCanvas'), ctx = canvas.getContext('2d');
        const dynamicHeight = 300 + (cart.length * 280) + 150; 
        canvas.height = dynamicHeight;
        
        ctx.fillStyle = "white"; ctx.fillRect(0, 0, 384, canvas.height);
        ctx.textBaseline = "top"; ctx.fillStyle = "black"; ctx.textAlign = "center"; 
        
        ctx.font = "bold 26px sans-serif";
        ctx.fillText("Million FishBall Noodle", 192, 20);
        ctx.font = "18px sans-serif";
        ctx.fillText(new Date().toLocaleString(), 192, 55);
        ctx.font = "bold 44px sans-serif";
        ctx.fillText(`No. ${orderNo}`, 192, 85);
        ctx.font = "bold 20px sans-serif";
        ctx.fillText("------------------------------------------", 192, 135);
        
        let y = 175;
        cart.forEach((item, i) => {
            // 獲取列印語言對應的名稱
            const getName = (k) => (dictionary.items[k] && dictionary.items[k][printLang]) ? dictionary.items[k][printLang] : k;
            
            const pMain = getName(item.mainKey);
            const pSize = getName(item.sizeKey).replace('的', '');
            const pNoodle = item.noodleKey === '湯品' ? '' : getName(item.noodleKey);
            const pSauces = item.sauceKeys.map(k => getName(k)).join(',');
            const unit = item.category === '湯' ? (printLang==='zh'?'碗':'bowl') : (printLang==='zh'?'份':'qty');
            
            // 1. 主食名稱 (42px)
            ctx.font = "bold 42px sans-serif"; 
            ctx.fillText(`${pMain} (${item.qty}${unit})`, 192, y); y += 50;
            
            // 2. 麵種/醬料/大小 (32px)
            ctx.font = "bold 32px sans-serif";
            ctx.fillText(`[${pSize}] ${pNoodle} ${pSauces}`, 192, y); y += 45;
            
            // 3. 特別要求 (32px)
            if(item.specialKeys.length > 0) {
                const pSpecials = item.specialKeys.map(k => getName(k)).join(',');
                ctx.font = "bold 32px sans-serif";
                ctx.fillText(`★ ${pSpecials}`, 192, y); y += 45;
            }

            // 4. 加料區 (30px)
            let addsStr = Object.entries(item.additionKeys)
                .filter(([k,v])=>v>0)
                .map(([k,v])=>`${getName(k)}(${v*getItemRatio(k)}${getItemUnit(k, printLang)})`)
                .join(',');
            
            if(addsStr) {
                ctx.font = "bold 30px sans-serif";
                ctx.fillText(`${printLang==='zh'?'+加料':'+Add'}: ${addsStr}`, 192, y); y += 45;
            }
            
            // 5. 不要區 (30px)
            if(item.noExtraKeys.length > 0) {
                const pNo = item.noExtraKeys.map(k => getName(k)).join(',');
                ctx.font = "bold 30px sans-serif";
                ctx.fillText(`[${printLang==='zh'?'不要':'No'}: ${pNo}]`, 192, y); y += 45;
            }
            y += 25; 
        });

        ctx.font = "bold 20px sans-serif";
        ctx.fillText("------------------------------------------", 192, y); y += 40;
        ctx.font = "bold 42px sans-serif";
        ctx.fillText("TOTAL: $" + document.getElementById('cart-total-sum').innerText, 192, y);
    }

    async function handleFinalizeAndPrint(printLang) {
        const btn = document.getElementById('printBtn');
        try {
            btn.disabled = true;
            const targetChar = await getPrinter();
            const orderData = getOrderData();
            
            document.getElementById('status-text').innerText = "📤 列印中...";
            drawPrintCanvas(orderData.num, printLang);
            
            const pixels = document.getElementById('printCanvas').getContext('2d').getImageData(0, 0, 384, document.getElementById('printCanvas').height).data;
            await targetChar.writeValue(new Uint8Array([0x1B, 0x40])); 
            const widthBytes = 48;
            for (let y = 0; y < document.getElementById('printCanvas').height; y++) {
                let row = new Uint8Array(8 + widthBytes);
                row.set([0x1D, 0x76, 0x30, 0, widthBytes, 0, 1, 0]);
                for (let x = 0; x < widthBytes; x++) {
                    let b = 0;
                    for (let bit = 0; bit < 8; bit++) {
                        let idx = ((y * 384) + (x * 8 + bit)) * 4;
                        if (pixels[idx] * 0.3 + pixels[idx+1] * 0.59 + pixels[idx+2] * 0.11 < 135) b |= (1 << (7 - bit));
                    }
                    row[8 + x] = b;
                }
                if (isFastMode) await targetChar.writeValueWithoutResponse(row); else await targetChar.writeValue(row);
                if (y % 20 === 0) await new Promise(r => setTimeout(r, 50));
            }
            await targetChar.writeValue(new Uint8Array([0x1B, 0x64, 0x06, 0x1D, 0x56, 0x00])); 
            
            orderData.num++;
            saveOrderData(orderData);
            document.getElementById('status-text').innerText = "✅ 完成";
            alert("列印成功！");
            clearWholeOrder();
        } catch (e) {
            alert("列印失敗：" + e.message);
            btn.disabled = false;
        }
    }

    // --- 購物車增減功能 ---
    function changeQty(index, delta) {
        let item = cart[index];
        if (item.qty + delta < 1) {
            if (confirm(userLang==='zh'?"取消此訂單？":"Remove this item?")) {
                cart.splice(index, 1);
            }
        } else {
            item.qty += delta;
        }
        renderFinalCart();
    }

    // --- UI 控制 ---
    function selectLanguage(lang) { userLang = lang; updateUIText(); goNext('step-start'); }
    function updateUIText() {
        const u = dictionary.ui[userLang];
        document.getElementById('t-select-cat').innerText = u.select_cat;
        document.getElementById('t-cat-soup').innerText = u.cat_soup; document.getElementById('t-cat-noodle').innerText = u.cat_noodle;
        document.getElementById('t-select-soup').innerText = u.select_soup; document.getElementById('t-select-food').innerText = u.select_food;
        document.getElementById('t-select-noodle').innerText = u.select_noodle; document.getElementById('t-select-sauce').innerText = u.select_sauce;
        document.getElementById('t-select-no').innerText = u.select_no; document.getElementById('t-select-add').innerText = u.select_add;
        document.getElementById('t-cart-title').innerText = u.cart_title; document.getElementById('t-total').innerText = u.total;
        document.getElementById('t-special-label').innerText = u.special_label;
        document.getElementById('btn-next-assign').innerText = u.next; document.getElementById('btn-sauce-next').innerText = u.next;
        document.getElementById('btn-no-next').innerText = u.next; document.getElementById('btn-confirm-item').innerText = u.confirm;
        document.getElementById('btn-clear').innerText = u.clear; document.getElementById('btn-continue').innerText = u.continue;
        document.getElementById('printBtn').innerText = u.print;
    }

    function clearWholeOrder() {
        cart = []; mainCounts = {}; session = { category: '', sequence: [], currentIdx: 0 };
        document.querySelectorAll('.qty-val').forEach(v => v.innerText = '0');
        document.querySelectorAll('.opt').forEach(o => o.classList.remove('selected'));
        document.getElementById('printBtn').disabled = false;
        goNext('step-start');
    }

    const dictionary = {
        ui: {
            zh: { cat_soup:'湯品類', cat_noodle:'麵食類', next:'下一步', confirm:'✅ 確定此份', total:'總計', clear:'❌ 清空', continue:'➕ 繼續', print:'🖨️ 確認列印', select_cat:'1. 請選擇類別', select_soup:'2. 請選擇湯品', select_food:'2. 選擇麵食與數量', select_noodle:'3. 請選擇麵種', select_sauce:'4. 選擇醬料與要求', select_no:'5. 不要什麼？', select_add:'6. 加料區', cart_title:'🛒 購物車明細', special_label:'特別要求：' },
            en: { cat_soup:'Soup', cat_noodle:'Noodle', next:'Next', confirm:'✅ Confirm', total:'Total', clear:'❌ Clear', continue:'➕ Add More', print:'🖨️ Print Receipt', select_cat:'1. Select Category', select_soup:'2. Select Soup', select_food:'2. Select Item & Qty', select_noodle:'3. Select Noodle Type', select_sauce:'4. Sauce & Requests', select_no:'5. No Extras?', select_add:'6. Additions', cart_title:'🛒 Order Details', special_label:'Special Request:' }
        },
        items: {
            '魚圓面':{zh:'魚圓面', en:'Fishball Noodle'}, '香菇肉碎面':{zh:'香菇肉碎面', en:'Mushroom Minced Noodle'}, '招牌面':{zh:'招牌面', en:'Signature Noodle'}, '餐餐面':{zh:'餐餐面', en:'Can Can Noodle'}, '肉圓面':{zh:'肉圓面', en:'Meatball Noodle'}, '蝦魚面':{zh:'蝦魚面', en:'Prawn Fish Noodle'}, '西刀魚面':{zh:'西刀魚面', en:'Saito Fish Noodle'}, '香菇面':{zh:'香菇面', en:'Mushroom Noodle'}, '魚餃面':{zh:'魚餃面', en:'Fish Dumpling Noodle'}, '(純)肉碎面':{zh:'(純)肉碎面', en:'Pure Minced Noodle'}, '小魚香面':{zh:'小魚香面', en:'Small Fish Noodle'},
            '魚圓湯':{zh:'魚圓湯', en:'Fishball Soup'}, '肉圓湯':{zh:'肉圓湯', en:'Meatball Soup'}, '魚餃湯':{zh:'魚餃湯', en:'Fish Dumpling Soup'}, '三寶湯':{zh:'三寶湯', en:'Triple Treasure Soup'},
            '魚圓肉圓湯':{zh:'魚圓肉圓湯', en:'FB + MB Soup'}, '魚圓魚餃湯':{zh:'魚圓魚餃湯', en:'FB + FD Soup'},

    function getItemName(key, lang = userLang) { return (dictionary.items[key] && dictionary.items[key][lang]) ? dictionary.items[key][lang] : key; }
    function getItemRatio(key) { return (dictionary.items[key] && dictionary.items[key].ratio) ? dictionary.items[key].ratio : 1; }
    function getItemUnit(key, lang = userLang) { return (dictionary.items[key] && dictionary.items[key].unit) ? dictionary.items[key].unit[lang] : ''; }
    
    function goNext(id) { document.querySelectorAll('.step').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); window.scrollTo(0,0); }
    function setCategory(v) { session.category = v; mainCounts = {}; if (v === '湯') { renderSoupList(); goNext('step-soup-select'); } else { renderFoodList(); goNext('step-food-select'); } }

    function renderSoupList() {
        const cont = document.getElementById('grid-soupItems'); cont.innerHTML = '';
        Object.entries(config.soupImgs).forEach(([key, img]) => {
            const div = document.createElement('div'); div.className = 'opt';
            div.innerHTML = `<div class="img-box"><div class="price-circle">$${config.prices[key]}</div><img src="${img}"></div><span style="padding:10px; font-weight:bold;">${getItemName(key)}</span>`;
            div.onclick = () => { 
                tempItem = { mainKey: key, sizeKey: '小的', noodleKey: '湯品', sauceKeys: ['湯麵'], specialKeys: [], noExtraKeys: [], additionKeys: {}, price: config.prices[key], qty: 1, category: '湯' }; 
                session.sequence = [{ name: key, size: '小的' }]; session.currentIdx = 0; renderNoExtraList(); goNext('step-no-extra'); 
            };
            cont.appendChild(div);
        });
    }

    function renderFoodList() {
        const cont = document.getElementById('grid-foodItems'); cont.innerHTML = '';
        const labelS = getItemName('小的');
        const labelL = getItemName('大的');
        Object.keys(config.foodImgs).forEach(key => {
            const div = document.createElement('div'); div.className = 'opt';
            div.innerHTML = `<div class="img-box"><div class="price-circle">$${config.prices[key]}</div><img src="${config.foodImgs[key]}"></div><span style="padding:10px; font-weight:bold;">${getItemName(key)}</span>
            <div class="qty-input-overlay" onclick="event.stopPropagation()">
                <div class="qty-row">${labelS}<div style="display:flex;align-items:center;"><button class="qty-btn" onclick="changeMainQty('${key}','小的',-1)">-</button><span class="qty-val" id="ms-${key}">0</span><button class="qty-btn" onclick="changeMainQty('${key}','小的',1)">+</button></div></div>
                <div class="qty-row">${labelL}<div style="display:flex;align-items:center;"><button class="qty-btn" onclick="changeMainQty('${key}','大的',-1)">-</button><span class="qty-val" id="ml-${key}">0</span><button class="qty-btn" onclick="changeMainQty('${key}','大的',1)">+</button></div></div>
            </div>`;
            cont.appendChild(div);
        });
    }

    function changeMainQty(n, s, d) { const k = `${n}-${s}`; mainCounts[k] = Math.max(0, (mainCounts[k] || 0) + d); document.getElementById(s==='小的'?`ms-${n}`:`ml-${n}`).innerText = mainCounts[k]; }
    function checkFoodFlow() {
        session.sequence = []; Object.entries(mainCounts).forEach(([k, v]) => { if (v > 0) { const [n, s] = k.split('-'); for(let i=0; i<v; i++) session.sequence.push({ name: n, size: s }); } });
        if (session.sequence.length === 0) return alert(userLang==='zh'?"請選擇數量":"Select Qty");
        session.currentIdx = 0; startItemProcess();
    }

    function startItemProcess() {
        const cur = session.sequence[session.currentIdx];
        const titleText = userLang==='zh'?'分配中':'Assigning';
        document.getElementById('assign-title').innerHTML = `${titleText} (${session.currentIdx+1}/${session.sequence.length}):<br><b style="color:red; font-size:1.4rem;">${getItemName(cur.name)} [${getItemName(cur.size)}]</b>`;
        tempItem = { mainKey: cur.name, sizeKey: cur.size, noodleKey: '', sauceKeys: [], specialKeys: [], noExtraKeys: [], additionKeys: {}, price: config.prices[cur.name] + config.prices[cur.size], qty: 1, category: '面' };
        renderNoodleTypeList(); goNext('step-noodle-type');
    }

    function renderNoodleTypeList() {
        const cont = document.getElementById('grid-noodleType'); cont.innerHTML = '';
        Object.entries(config.noodleTypeImgs).forEach(([key, img]) => {
            const div = document.createElement('div'); div.className = 'opt';
            div.innerHTML = `<div class="img-box"><img src="${img}"></div><span style="padding:10px; font-weight:bold;">${getItemName(key)}</span>`;
            div.onclick = () => { tempItem.noodleKey = key; startSauceStep(); };
            cont.appendChild(div);
        });
    }

    function startSauceStep() {
        const sCont = document.getElementById('sauce-cont'); sCont.innerHTML = '';
        config.sauces.forEach(key => {
            const btn = document.createElement('button'); btn.className = 'sauce-btn'; btn.innerText = getItemName(key);
            btn.onclick = () => { btn.classList.toggle('selected'); if(tempItem.sauceKeys.includes(key)) tempItem.sauceKeys = tempItem.sauceKeys.filter(x=>x!==key); else tempItem.sauceKeys.push(key); };
            sCont.appendChild(btn);
        });
        const spCont = document.getElementById('special-cont'); spCont.innerHTML = '';
        config.specials.forEach(key => {
            const btn = document.createElement('button'); btn.className = 'sauce-btn'; btn.innerText = getItemName(key);
            btn.onclick = () => { btn.classList.toggle('selected'); if(tempItem.specialKeys.includes(key)) tempItem.specialKeys = tempItem.specialKeys.filter(x=>x!==key); else tempItem.specialKeys.push(key); };
            spCont.appendChild(btn);
        });
        goNext('step-sauce-select');
    }

    function checkSauceFlow() { if(tempItem.sauceKeys.length === 0) return alert(userLang==='zh'?"請選擇醬料":"Select Sauce"); renderNoExtraList(); goNext('step-no-extra'); }
    function renderNoExtraList() {
        const cont = document.getElementById('grid-noExtra'); cont.innerHTML = '';
        Object.entries(config.noExtraImgs).forEach(([key, img]) => {
            const div = document.createElement('div'); div.className = 'opt';
            div.innerHTML = `<div class="img-box"><img src="${img}"></div><span style="padding:10px; font-weight:bold;">${getItemName(key)}</span>`;
            div.onclick = () => { div.classList.toggle('selected'); if(tempItem.noExtraKeys.includes(key)) tempItem.noExtraKeys = tempItem.noExtraKeys.filter(x=>x!==key); else tempItem.noExtraKeys.push(key); };
            cont.appendChild(div);
        });
        renderAddList();
    }

    function renderAddList() {
        const cont = document.getElementById('grid-additions'); cont.innerHTML = '';
        config.additions.forEach(item => {
            const div = document.createElement('div'); div.className = 'opt';
            div.innerHTML = `<div class="img-box"><div class="price-circle">$${item.price}</div><img src="${item.img}"></div><span style="padding:5px; font-weight:bold; font-size:0.9rem;">${getItemName(item.key)}</span>
            <div class="qty-input-overlay" onclick="event.stopPropagation()"><button class="qty-btn" onclick="changeAddQty('${item.key}',-1)">-</button><span class="qty-val" id="aq-${item.key}">0</span><button class="qty-btn" onclick="changeAddQty('${item.key}',1)">+</button></div>`;
            cont.appendChild(div);
        });
    }

    function changeAddQty(k, d) { tempItem.additionKeys[k] = Math.max(0, (tempItem.additionKeys[k] || 0) + d); document.getElementById(`aq-${k}`).innerText = tempItem.additionKeys[k]; }
    
    function confirmOneItem() {
        let extraP = 0; config.additions.forEach(item => { if(tempItem.additionKeys[item.key]) extraP += item.price * tempItem.additionKeys[item.key]; });
        cart.push({ ...tempItem, price: tempItem.price + extraP, sauceKeys:[...tempItem.sauceKeys], specialKeys:[...tempItem.specialKeys], noExtraKeys:[...tempItem.noExtraKeys], additionKeys:{...tempItem.additionKeys} });
        session.currentIdx++; if(session.currentIdx < session.sequence.length) startItemProcess(); else { renderFinalCart(); goNext('step-finish'); }
    }

    function renderFinalCart() {
        const orderData = getOrderData();
        document.getElementById('order-no-display').innerText = `No. ${orderData.num}`;
        const cont = document.getElementById('cart-list-cont'); let total = 0;
        cont.innerHTML = cart.map((item, idx) => {
            let linePrice = item.price * item.qty;
            total += linePrice;
            
            // 英文版 Order Details 需要全英文顯示
            const dMain = getItemName(item.mainKey);
            const dSize = getItemName(item.sizeKey);
            const dNoodle = item.noodleKey === '湯品' ? '' : getItemName(item.noodleKey);
            const dSauces = item.sauceKeys.map(k => getItemName(k)).join(', ');
            const dSpecials = item.specialKeys.map(k => getItemName(k)).join(', ');
            const dNoExtras = item.noExtraKeys.map(k => getItemName(k)).join(', ');
            const addsStr = Object.entries(item.additionKeys)
                .filter(([k,v])=>v>0)
                .map(([k,v])=>`${getItemName(k)}(${v*getItemRatio(k)}${getItemUnit(k)})`)
                .join(', ');

            const mainUnit = item.category === '湯' ? (userLang==='zh'?'碗':'bowl') : (userLang==='zh'?'份':'qty');
            
            return `<div class="cart-item">
                <div class="cart-row">
                    <div class="cart-info">
                        <div style="font-weight:900; font-size:1.1rem;">${idx+1}. ${dMain}</div>
                        <div style="font-size:0.95rem; color:#111; font-weight:bold; margin-top:4px;">[${dSize}] ${dNoodle} ${dSauces}</div>
                        ${item.specialKeys.length ? `<div style="font-size:0.9rem; color:#f57c00; font-weight:900;">★ ${dSpecials}</div>` : ''}
                        ${addsStr ? `<div style="font-size:0.9rem; color:var(--add); font-weight:bold;">+ ${addsStr}</div>` : ''}
                        ${item.noExtraKeys.length ? `<div style="font-size:0.85rem; color:red;">[${userLang==='zh'?'不要':'No'}: ${dNoExtras}]</div>` : ''}
                        <div style="font-weight:bold; color:var(--price-tag); margin-top:8px;">$${linePrice.toFixed(2)}</div>
                    </div>
                    <div class="cart-ctrls">
                        <div style="display:flex; align-items:center; background:#eee; border-radius:10px; padding:2px;">
                            <button class="qty-btn" onclick="changeQty(${idx}, -1)">-</button>
                            <span class="qty-num" style="padding:0 10px; font-weight:bold;">${item.qty}${mainUnit}</span>
                            <button class="qty-btn" onclick="changeQty(${idx}, 1)">+</button>
                        </div>
                    </div>
                </div>
            </div>`;
        }).join('');
        document.getElementById('cart-total-sum').innerText = total.toFixed(2);
    }

    function handleSauceBack() { if(session.category === '湯') goNext('step-soup-select'); else goNext('step-noodle-type'); }
    function handleNoExtraBack() { if(session.category === '湯') goNext('step-soup-select'); else goNext('step-sauce-select'); }
</script>
</body>
</html>
