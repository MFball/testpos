<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Million FishBall Noodle - Ver 3.7.2 完整修復版</title>
    
    <style>
        /* --- 顏色與變數設定 --- */
        :root { 
            --primary: #1a73e8;    /* 主色：藍色 */
            --secondary: #f0f2f5;  /* 背景：淺灰 */
            --success: #34a853;    /* 確定：綠色 */
            --price-tag: #d93025;  /* 價格：紅色 */
            --add: #673ab7;        /* 加料：紫色 */
            --bg-white: #ffffff; 
            --edit: #f39c12;       /* 修改：橘色 */
        }

        /* --- 基本排版 --- */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: -apple-system, "Helvetica Neue", sans-serif; 
            background: var(--secondary); 
            margin: 0; padding: 10px; 
            user-select: none; 
        }

        /* --- 外框容器 --- */
        .container { 
            max-width: 600px; margin: auto; background: var(--bg-white); 
            padding: 15px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            padding-bottom: 150px; 
            min-height: 95vh; position: relative; 
        }

        /* --- 頂部狀態列 --- */
        #status-bar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px 12px; background: #fff; border-radius: 12px; margin-bottom: 10px;
            font-size: 11px; font-weight: bold; border: 1px solid #eee;
        }

        /* --- 步驟切換控制 --- */
        .step { display: none; animation: fadeIn 0.3s ease; }
        .step.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .back-btn-top { 
            position: absolute; left: 15px; top: 15px; width: 40px; height: 40px; 
            border-radius: 50%; background: #eee; border: none; font-size: 22px; z-index: 100;
        }

        /* --- 歷史記錄面板 --- */
        #history-panel { 
            display:none; position:fixed; top:10%; left:5%; right:5%; bottom:10%;
            background:white; z-index:2000; border-radius:24px; box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            padding:20px; border:3px solid var(--primary); overflow-y:auto;
        }
        .hist-item { display:flex; justify-content:space-between; align-items:center; padding:15px; border-bottom:1px solid #eee; }

        /* --- 點餐卡片佈局 --- */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .opt { 
            background: #fff; border: 2.5px solid #f1f3f4; border-radius: 16px; 
            cursor: pointer; position: relative; display: flex; flex-direction: column; 
            overflow: hidden; min-height: 160px; text-align: center; transition: 0.2s;
        }
        .opt.selected { border-color: var(--primary); background: #f1f8ff; }

        .img-box { width: 100%; height: 110px; background: #fafafa; display: flex; justify-content: center; align-items: center; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }

        .price-circle { 
            position: absolute; top: 5px; right: 5px; background: var(--price-tag); 
            color: white; min-width: 42px; height: 32px; border-radius: 16px; 
            display: flex; align-items: center; justify-content: center; padding: 0 5px;
            font-size: 0.8rem; font-weight: bold; border: 2.2px solid white;
        }

        /* --- 快捷按鈕樣式 --- */
        .quick-grid { display: grid; grid-template-columns: 1fr; gap: 10px; margin-top: 20px; border-top: 2px dashed #ccc; padding-top: 20px; }
        .quick-btn { 
            display: flex; align-items: center; background: #fff; border: 2px solid var(--add); 
            border-radius: 15px; padding: 10px; cursor: pointer; text-align: left; transition: 0.2s;
        }
        .quick-btn:active { background: #f3e5f5; transform: scale(0.98); }
        .quick-btn img { width: 50px; height: 50px; border-radius: 10px; margin-right: 12px; }
        .quick-info { flex: 1; }
        .quick-title { font-weight: 900; color: var(--add); font-size: 1.1rem; }
        .quick-desc { font-size: 0.85rem; color: #666; }

        /* --- 數量加減按鈕 --- */
        .qty-input-overlay { 
            background: #fcfcfc; display: flex; flex-direction: column; justify-content: center; 
            padding: 8px 2px; border-top: 1px solid #eee; gap: 5px;
        }
        .qty-row { display: flex; justify-content: space-around; align-items: center; font-size: 0.8rem; font-weight: bold; }
        .qty-btn { width: 34px; height: 34px; border-radius: 8px; border: 1px solid #ccc; background: white; color: var(--primary); font-weight: bold; font-size: 1.2rem; display:flex; align-items:center; justify-content:center; }
        .qty-val { font-size: 1.1rem; margin: 0 8px; min-width: 20px; display: inline-block; }

        /* --- 底部固定按鈕區 --- */
        .nav-btns { 
            position: fixed; bottom: 0; left: 0; right: 0; background: white; 
            padding: 15px 12px 25px 12px; display: flex; gap: 10px; 
            max-width: 600px; margin: auto; box-shadow: 0 -5px 15px rgba(0,0,0,0.08); z-index: 1000; 
        }
        .main-action { flex: 1; padding: 18px 5px; border-radius: 12px; border: none; font-size: 1.1rem; cursor: pointer; font-weight: 900; color: white; }

        .sauce-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .sauce-btn { padding: 15px 2px; border: 2.2px solid #eee; border-radius: 12px; background: white; font-weight: 900; font-size: 0.85rem; }
        .sauce-btn.selected { border-color: var(--primary); background: #e8f0fe; color: var(--primary); }

        .special-box { background: #fff8e1; padding: 12px; border-radius: 16px; border: 1.5px dashed #ffe082; margin-top: 15px; }

        .cart-item { border-bottom: 2px solid #eee; padding: 15px 0; text-align: left; }
        .cart-row { display: flex; justify-content: space-between; align-items: flex-start; }
        .cart-ctrls { display: flex; flex-direction: column; align-items: flex-end; gap: 10px; }
        .edit-btn { background: var(--edit); color: white; border: none; padding: 5px 10px; border-radius: 8px; font-weight: bold; font-size: 0.8rem; }
        
        canvas { display: none; }
    </style>
</head>

    /* --- 藍牙核心 --- */
    async function getPrinter() {
        if (savedDevice && savedDevice.gatt.connected && savedCharacteristic) return savedCharacteristic;
        document.getElementById('status-text').innerText = "🔍 搜尋印表機...";
        try {
            savedDevice = await navigator.bluetooth.requestDevice({ acceptAllDevices: true, optionalServices: ['0000ffe0-0000-1000-8000-00805f9b34fb'] });
            const server = await savedDevice.gatt.connect();
            const services = await server.getPrimaryServices();
            for (const s of services) {
                const chars = await s.getCharacteristics();
                savedCharacteristic = chars.find(c => c.properties.writeWithoutResponse) || chars.find(c => c.properties.write);
                if (savedCharacteristic) { isFastMode = !!chars.find(c => c.properties.writeWithoutResponse); break; }
            }
            document.getElementById('status-text').innerText = "● 藍牙已連線";
            document.getElementById('status-text').style.color = "#34a853";
            return savedCharacteristic;
        } catch (e) { document.getElementById('status-text').innerText = "❌ 未連線"; throw e; }
    }

    function askPrintLanguage() {
        if (cart.length === 0) return;
        const choice = confirm("選擇列印語言:\n【確定/OK】 = 中文\n【取消/Cancel】 = English");
        handleFinalizeAndPrint(choice ? 'zh' : 'en');
    }

    async function handleFinalizeAndPrint(printLang, forcedNo = null, isReprint = false) {
        const btn = document.getElementById('printBtn');
        try {
            btn.disabled = true;
            const targetChar = await getPrinter();
            const orderData = getOrderData();
            const currentNo = forcedNo || orderData.num;
            
            document.getElementById('status-text').innerText = "📤 列印中...";
            drawPrintCanvas(currentNo, printLang); 
            
            const pixels = document.getElementById('printCanvas').getContext('2d').getImageData(0, 0, 384, document.getElementById('printCanvas').height).data;
            await targetChar.writeValue(new Uint8Array([0x1B, 0x40]));
            
            const widthBytes = 48;
            for (let y = 0; y < document.getElementById('printCanvas').height; y++) {
                let row = new Uint8Array(8 + widthBytes);
                row.set([0x1D, 0x76, 0x30, 0, widthBytes, 0, 1, 0]);
                for (let x = 0; x < widthBytes; x++) {
                    let b = 0;
                    for (let bit = 0; bit < 8; bit++) {
                        let idx = ((y * 384) + (x * 8 + bit)) * 4;
                        if (pixels[idx] * 0.3 + pixels[idx+1] * 0.59 + pixels[idx+2] * 0.11 < 135) b |= (1 << (7 - bit));
                    }
                    row[8 + x] = b;
                }
                if (isFastMode) await targetChar.writeValueWithoutResponse(row); else await targetChar.writeValue(row);
                if (y % 20 === 0) await new Promise(r => setTimeout(r, 50));
            }

            // 新切紙指令
            await targetChar.writeValue(new Uint8Array([0x1B, 0x64, 0x02, 0x1D, 0x56, 0x00]));

            if (!isReprint) {
                orderData.history.unshift({ num: currentNo, total: document.getElementById('cart-total-sum').innerText, items: JSON.parse(JSON.stringify(cart)) });
                orderData.num++; saveOrderData(orderData);
                alert("列印成功！"); clearWholeOrder();
            } else { alert("重印成功！"); }
            document.getElementById('status-text').innerText = "● 已完成";
            btn.disabled = false;
        } catch (e) { alert("列印失敗：" + e.message); btn.disabled = false; }
    }

    function drawPrintCanvas(orderNo, printLang) {
        const canvas = document.getElementById('printCanvas'), ctx = canvas.getContext('2d');
        const dynamicHeight = 300 + (cart.length * 250) + 100;
        canvas.height = dynamicHeight;
        
        ctx.fillStyle = "white"; ctx.fillRect(0, 0, 384, canvas.height);
        ctx.textBaseline = "top"; ctx.fillStyle = "black"; ctx.textAlign = "center";
        const centerX = 192, maxW = 360;

        ctx.font = "bold 28px sans-serif";
        ctx.fillText("Million FishBall Noodle", centerX, 20);
        ctx.font = "18px sans-serif"; ctx.fillText(new Date().toLocaleString(), centerX, 55);
        ctx.font = "bold 46px sans-serif"; ctx.fillText(`No. ${orderNo}`, centerX, 85);
        ctx.font = "bold 20px sans-serif"; ctx.fillText("------------------------------------------", centerX, 140);
        
        let y = 180;
        cart.forEach((item) => {
            const getName = (k) => (dictionary.items[k] && dictionary.items[k][printLang]) ? dictionary.items[k][printLang] : k;
            const unit = item.category === '湯' ? (printLang==='zh'?'碗':'bowl') : (printLang==='zh'?'份':'qty');
            
            ctx.font = (printLang === 'en') ? "bold 34px sans-serif" : "bold 42px sans-serif";
            ctx.fillText(`${getName(item.mainKey)} (${item.qty}${unit})`, centerX, y, maxW); 
            y += 50;

            ctx.font = "bold 28px sans-serif"; 
            let detailStr = `[${getName(item.sizeKey).replace('的','')}] ${item.noodleKey==='湯品'?'':getName(item.noodleKey)} ${item.sauceKeys.map(k=>getName(k)).join(',')}`;
            ctx.fillText(detailStr, centerX, y, maxW);
            y += 40;
            
            if(item.specialKeys.length) { 
                ctx.font = "bold 26px sans-serif";
                ctx.fillText(`★ ${item.specialKeys.map(k=>getName(k)).join(',')}`, centerX, y, maxW); 
                y += 35; 
            }

            let addsStr = Object.entries(item.additionKeys).filter(([k,v])=>v>0).map(([k,v])=>`${getName(k)}`).join(',');
            if(addsStr) { 
                ctx.font = "bold 24px sans-serif";
                ctx.fillText(`+${printLang==='zh'?'加':'Add'}: ${addsStr}`, centerX, y, maxW); 
                y += 35; 
            }

            if(item.noExtraKeys.length) { 
                ctx.font = "bold 24px sans-serif";
                ctx.fillText(`[${printLang==='zh'?'不要':'No'}: ${item.noExtraKeys.map(k=>getName(k)).join(',')}]`, centerX, y, maxW); 
                y += 35; 
            }
            y += 40;
        });

        ctx.font = "bold 42px sans-serif";
        ctx.fillText("TOTAL: $" + document.getElementById('cart-total-sum').innerText, centerX, y + 20);
    }

    function startSauceStep() {
        const sCont = document.getElementById('sauce-cont'); sCont.innerHTML = '';
        config.sauces.forEach(key => {
            const btn = document.createElement('button'); btn.className = 'sauce-btn'; btn.innerText = getItemName(key);
            if(tempItem.sauceKeys.includes(key)) btn.classList.add('selected');
            btn.onclick = () => {
                if (key === '湯麵') tempItem.sauceKeys = ['湯麵'];
                else {
                    tempItem.sauceKeys = tempItem.sauceKeys.filter(x => x !== '湯麵');
                    if (tempItem.sauceKeys.includes(key)) tempItem.sauceKeys = tempItem.sauceKeys.filter(x => x !== key);
                    else tempItem.sauceKeys.push(key);
                }
                startSauceStep();
            };
            sCont.appendChild(btn);
        });

        const spCont = document.getElementById('special-cont'); spCont.innerHTML = '';
        config.specials.forEach(key => {
            const div = document.createElement('div'); div.className = 'sauce-btn'; div.innerText = getItemName(key);
            if(tempItem.specialKeys.includes(key)) div.classList.add('selected');
            div.onclick = () => {
                if (tempItem.specialKeys.includes(key)) tempItem.specialKeys = tempItem.specialKeys.filter(x => x !== key);
                else tempItem.specialKeys.push(key);
                startSauceStep();
            };
            spCont.appendChild(div);
        });
        goNext('step-sauce-select');
    }

            div.innerHTML = `<div style="padding:20px; font-weight:bold; font-size:1.2rem;">${getItemName(key)}</div>`;
            div.onclick = () => {
                if (tempItem.noExtraKeys.includes(key)) tempItem.noExtraKeys = tempItem.noExtraKeys.filter(x => x !== key);
                else tempItem.noExtraKeys.push(key);
                renderNoExtraList();
            };
            cont.appendChild(div);
        });
        renderAdditionList();
    }

    function renderAdditionList() {
        const cont = document.getElementById('grid-additions'); cont.innerHTML = '';
        config.additions.forEach(obj => {
            const div = document.createElement('div'); div.className = 'opt';
            const count = tempItem.additionKeys[obj.key] || 0;
            if (count > 0) div.classList.add('selected');
            div.innerHTML = `
                <div class="img-box"><div class="price-circle">$${obj.price}</div><img src="${obj.img}"></div>
                <span style="padding:5px; font-weight:bold;">${getItemName(obj.key)}</span>
                <div class="qty-input-overlay" onclick="event.stopPropagation()">
                    <div class="qty-row">
                        <button class="qty-btn" onclick="changeAddQty('${obj.key}',-1)">-</button>
                        <span class="qty-val">${count}</span>
                        <button class="qty-btn" onclick="changeAddQty('${obj.key}',1)">+</button>
                    </div>
                </div>`;
            cont.appendChild(div);
        });
    }

    function changeAddQty(k, d) {
        tempItem.additionKeys[k] = Math.max(0, (tempItem.additionKeys[k] || 0) + d);
        renderAdditionList();
    }

    function confirmOneItem() {
        let addTotal = 0;
        Object.entries(tempItem.additionKeys).forEach(([k, v]) => { if (v > 0) addTotal += (v * config.prices[k]); });
        tempItem.price = config.prices[tempItem.mainKey] + (tempItem.category==='面'?config.prices[tempItem.sizeKey]:0) + addTotal;
        
        if (session.isEditing) { cart[session.editTargetIdx] = JSON.parse(JSON.stringify(tempItem)); } 
        else { cart.push(JSON.parse(JSON.stringify(tempItem))); }

        if (!session.isEditing && session.currentIdx < session.sequence.length - 1) {
            session.currentIdx++; startItemProcess();
        } else { goNext('step-finish'); }
    }

    function renderFinalCart() {
        const cont = document.getElementById('cart-list-cont');
        let totalAll = 0;
        cont.innerHTML = cart.map((item, idx) => {
            totalAll += (item.price * item.qty);
            return `
            <div class="cart-item">
                <div class="cart-row">
                    <div>
                        <div style="font-weight:900; font-size:1.2rem;">${getItemName(item.mainKey)} (${item.qty})</div>
                        <div style="font-size:0.9rem; color:#666;">[${getItemName(item.sizeKey)}] ${item.noodleKey==='湯品'?'':getItemName(item.noodleKey)} + ${item.sauceKeys.map(k=>getItemName(k)).join(',')}</div>
                        ${item.specialKeys.length ? `<div style="font-size:0.85rem; color:#f57c00;">★ ${item.specialKeys.map(k=>getItemName(k)).join(',')}</div>`:''}
                        ${item.noExtraKeys.length ? `<div style="font-size:0.85rem; color:red;">[不要: ${item.noExtraKeys.map(k=>getItemName(k)).join(',')}]</div>`:''}
                    </div>
                    <div class="cart-ctrls">
                        <div style="font-weight:bold; color:var(--price-tag);">$${(item.price*item.qty).toFixed(2)}</div>
                        <button class="edit-btn" onclick="editCartItem(${idx})">修改</button>
                    </div>
                </div>
            </div>`;
        }).join('');
        document.getElementById('cart-total-sum').innerText = totalAll.toFixed(2);
        document.getElementById('order-no-display').innerText = `下一單編號: No. ${getOrderData().num}`;
    }

    function editCartItem(idx) {
        const item = cart[idx]; session.isEditing = true; session.editTargetIdx = idx; session.category = item.category;
        tempItem = JSON.parse(JSON.stringify(item));
        document.getElementById('assign-title').innerHTML = `修改中:<br><b style="color:#f39c12; font-size:1.4rem;">${getItemName(tempItem.mainKey)} [${getItemName(tempItem.sizeKey)}]</b>`;
        if (item.category === '湯') { renderNoExtraList(); goNext('step-no-extra'); } 
        else { renderNoodleTypeList(); goNext('step-noodle-type'); }
    }

    function getItemName(k) { return (dictionary.items[k] && dictionary.items[k][userLang]) ? dictionary.items[k][userLang] : k; }
    function handleNoodleBack() { if(session.isEditing) goNext('step-finish'); else goNext('step-food-select'); }
    function handleSauceBack() { renderNoodleTypeList(); goNext('step-noodle-type'); }
    function handleNoExtraBack() { if (tempItem.category==='湯') goNext('step-soup-select'); else startSauceStep(); }

</script>
</body>
</html>
