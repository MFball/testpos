<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Million Gold Bowl - ver 3.3.0 (Bilingual)</title>
    <style>
        /* 延用 3.2.4 的視覺樣式 */
        :root { --primary: #1a73e8; --secondary: #f0f2f5; --success: #34a853; --price-tag: #d93025; --add: #673ab7; --bg-white: #ffffff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, sans-serif; background: var(--secondary); margin: 0; padding: 10px; user-select: none; }
        /* 這裡可以根據你之前的需求修改 max-width */
        .container { max-width: 500px; margin: auto; background: var(--bg-white); padding: 15px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); padding-bottom: 150px; min-height: 92vh; position: relative; }
        .step { display: none; animation: fadeIn 0.3s ease; }
        .step.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .back-btn-top { position: absolute; left: 15px; top: 15px; width: 40px; height: 40px; border-radius: 50%; background: #eee; border: none; font-size: 22px; z-index: 100; }
        h2 { color: #202124; font-size: 1.15rem; margin: 30px 0 15px 0; border-left: 6px solid var(--primary); padding-left: 12px; font-weight: 900; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .opt { background: #fff; border: 2.5px solid #f1f3f4; border-radius: 16px; cursor: pointer; position: relative; display: flex; flex-direction: column; overflow: hidden; min-height: 150px; }
        .opt.selected { border-color: var(--primary); background: #f1f8ff; }
        .img-box { width: 100%; height: 110px; background: #fafafa; display: flex; justify-content: center; align-items: center; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }
        .price-circle { position: absolute; top: 5px; right: 5px; background: var(--price-tag); color: white; width: 42px; height: 32px; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: bold; border: 2.2px solid white; }
        .qty-input-overlay { background: #fcfcfc; display: flex; padding: 6px 2px; border-top: 1px solid #eee; }
        .qty-row { display: flex; flex-direction: column; align-items: center; font-size: 0.7rem; font-weight: bold; flex: 1; }
        .qty-btn { width: 28px; height: 28px; border-radius: 8px; border: 1px solid #ccc; background: white; color: var(--primary); font-weight: bold; }
        .nav-btns { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 15px 12px 25px 12px; display: flex; gap: 10px; max-width: 500px; margin: auto; box-shadow: 0 -5px 15px rgba(0,0,0,0.08); z-index: 1000; }
        .main-action { flex: 1; padding: 16px 5px; border-radius: 12px; border: none; font-size: 1rem; cursor: pointer; font-weight: 900; color: white; }
        .sauce-btn { flex: 1; padding: 15px 2px; border: 2.2px solid #eee; border-radius: 12px; background: white; font-weight: 900; }
        .sauce-btn.selected { border-color: var(--primary); background: #e8f0fe; color: var(--primary); }
        .cart-controls { display: flex; align-items: center; gap: 12px; margin-top: 10px; background: #f8f9fa; padding: 8px; border-radius: 12px; justify-content: flex-end; }
        .cart-qty-btn { width: 34px; height: 34px; border-radius: 50%; border: 1.5px solid var(--primary); background: white; color: var(--primary); font-size: 1.2rem; font-weight: bold; }
        .lang-btn { height: 100px; font-size: 1.5rem; font-weight: 900; border-radius: 20px; border: 3px solid #eee; background: white; }
    </style>
</head>
<body>

<div class="container">
    <div id="status" style="font-size: 11px; color: var(--price-tag); font-weight: bold;">● MILLION GOLD BOWL ver 3.3.0</div>

    <div class="step active" id="step-lang">
        <h2 style="text-align:center; border:none; margin-top:50px;">Please Select Language<br>請選擇語言</h2>
        <div style="display: flex; flex-direction: column; gap: 20px; margin-top: 30px;">
            <button class="lang-btn" onclick="selectLanguage('zh')">中文 (繁體)</button>
            <button class="lang-btn" onclick="selectLanguage('en')">English</button>
        </div>
    </div>
    
    <div class="step" id="step-start">
        <h2 id="t-select-cat">1. 請選擇類別</h2>
        <div class="grid">
            <div class="opt" onclick="setCategory('湯')">
                <div class="img-box"><img src="https://lh3.googleusercontent.com/pw/AP1GczPcUu3GOW3xZtOFVh7le33bCNVW4F1tyBvv5cJ2V7meVDPq0zf1ZGjITf5IZdLkRv1icKIZPDvvAphvYNS6T0ZNbId2RSHGREkuS7uzTiz8boh3Fo8=w2400?source=screenshot.guru"></div>
                <span id="t-cat-soup">湯品類</span>
            </div>
            <div class="opt" onclick="setCategory('面')">
                <div class="img-box"><img src="https://lh3.googleusercontent.com/pw/AP1GczM1EgErnLz57PZ0ckyDapaXUx27rggwr5VvU49Yo1vpygNeiLiTCVK6nGMT7UewX9jWyWN7Q04y5g8QeGtKBFBtYod8YZd1L42sFsRuRCpY2EvidrI=w2400?source=screenshot.guru"></div>
                <span id="t-cat-noodle">麵食類</span>
            </div>
        </div>
    </div>

    <div class="step" id="step-food-select">
        <button class="back-btn-top" onclick="goNext('step-start')">←</button>
        <h2 id="t-select-food" style="margin-left: 55px;">2. 選擇麵食與數量</h2>
        <div class="grid" id="grid-foodItems"></div>
        <div class="nav-btns">
            <button class="main-action" style="background:var(--primary)" onclick="checkFoodFlow()" id="btn-next-assign">下一步 (分配麵種)</button>
        </div>
    </div>

    <div class="step" id="step-noodle-type">
        <div id="assign-title" style="background:#e3f2fd; color:#0d47a1; padding:12px; border-radius:12px; margin-bottom:12px; font-weight:900;"></div>
        <h2 id="t-select-noodle" style="margin-left: 55px;">3. 請選擇麵種</h2>
        <div class="grid" id="grid-noodleType"></div>
    </div>

    <div class="step" id="step-sauce-select">
        <button class="back-btn-top" onclick="handleSauceBack()">←</button>
        <h2 id="t-select-sauce" style="margin-left: 55px;">4. 選擇醬料</h2>
        <div id="sauce-cont" class="grid" style="grid-template-columns: 1fr 1fr 1fr;"></div>
        <div class="nav-btns">
            <button class="main-action" style="background:var(--primary)" onclick="checkSauceFlow()" id="btn-sauce-next">下一步</button>
        </div>
    </div>

    <div class="step" id="step-no-extra">
        <h2 id="t-select-no" style="margin-left: 55px;">5. 不要什麼？</h2>
        <div class="grid" id="grid-noExtra"></div>
        <div class="nav-btns">
            <button class="main-action" style="background:var(--primary)" onclick="goNext('step-additions')" id="btn-no-next">下一步</button>
        </div>
    </div>
    
    <div class="step" id="step-additions">
        <h2 id="t-select-add" style="margin-left: 55px;">6. 加料區</h2>
        <div class="grid" id="grid-additions"></div>
        <div class="nav-btns">
            <button class="main-action" style="background:var(--success)" onclick="confirmOneItem()" id="btn-confirm-item">✅ 確定此份</button>
        </div>
    </div>

    <div class="step" id="step-finish">
        <h2 id="t-cart-title" style="text-align:center; border:none;">🛒 購物車明細</h2>
        <div id="cart-list-cont" style="border: 1.5px solid #ddd; border-radius: 18px; padding: 15px; background: #fff;"></div>
        <div style="font-size: 2.2rem; color: var(--price-tag); font-weight: 900; margin: 20px 0; text-align: center;">
            <span id="t-total">總計</span>: $<span id="cart-total-sum">0.00</span>
        </div>
        <div class="nav-btns">
            <button class="main-action" style="background:var(--price-tag)" onclick="location.reload()" id="btn-clear">❌ 清空</button>
            <button class="main-action" style="background:var(--add)" onclick="goNext('step-start')" id="btn-continue">➕ 繼續</button>
            <button class="main-action" style="background:var(--primary)" id="printBtn" onclick="finalizePrint()">🖨️ 列印</button>
        </div>
    </div>
</div>

<canvas id="printCanvas" width="384" style="display:none;"></canvas>

<script>
    /* ==========================================
       【多語言字典】
       所有的文字都在這裡，你可以自行修改對應翻譯
       ========================================== */
    const dictionary = {
        ui: {
            zh: { cat_soup: '湯品類', cat_noodle: '麵食類', next: '下一步', confirm: '✅ 確定此份', total: '總計', clear: '❌ 清空', continue: '➕ 繼續', print: '🖨️ 列印', select_food: '2. 選擇麵食與數量', select_noodle: '3. 請選擇麵種', select_sauce: '4. 選擇醬料', select_no: '5. 不要什麼？', select_add: '6. 加料區', cart_title: '🛒 購物車明細', cancel_confirm: '確定要取消這份訂單嗎？', print_ask: 'Print in English? (Cancel for Chinese)' },
            en: { cat_soup: 'Soup', cat_noodle: 'Noodle', next: 'Next', confirm: '✅ Confirm', total: 'Total', clear: '❌ Clear', continue: '➕ Add More', print: '🖨️ Print', select_food: '2. Select Item & Qty', select_noodle: '3. Select Noodle Type', select_sauce: '4. Select Sauce', select_no: '5. No Extras?', select_add: '6. Additions', cart_title: '🛒 Shopping Cart', cancel_confirm: 'Cancel this item?', print_ask: 'Print in English? (Select Cancel for Chinese)' }
        },
        items: {
            '魚圓面': { zh: '魚圓面', en: 'Fishball Noodle' },
            '香菇肉碎面': { zh: '香菇肉碎面', en: 'Mushroom Minced Meat Noodle' },
            '招牌面': { zh: '招牌面', en: 'Signature Noodle' },
            '魚圓湯': { zh: '魚圓湯', en: 'Fishball Soup' },
            '大的': { zh: '大的', en: 'Large' },
            '小的': { zh: '小的', en: 'Small' },
            '面薄': { zh: '面薄', en: 'Mee Pok' },
            '幼面': { zh: '幼面', en: 'Mee Kia' },
            '辣椒': { zh: '辣椒', en: 'Chili' },
            '茄汁': { zh: '茄汁', en: 'Tomato Sauce' },
            '湯麵': { zh: '湯麵', en: 'Soup Base' },
            '肉碎': { zh: '肉碎', en: 'Minced Meat' },
            '蔥': { zh: '蔥', en: 'Spring Onion' },
            '魚圓': { zh: '魚圓', en: 'Fishball' }
        }
    };

    const config = {
        prices: { '魚圓面':4, '香菇肉碎面':5, '招牌面':6, '魚圓湯':5, '大的':1, '小的':0 },
        foodImgs: { '魚圓面': 'https://lh3.googleusercontent.com/pw/AP1GczM1EgErnLz57PZ0ckyDapaXUx27rggwr5VvU49Yo1vpygNeiLiTCVK6nGMT7UewX9jWyWN7Q04y5g8QeGtKBFBtYod8YZd1L42sFsRuRCpY2EvidrI=w2400?source=screenshot.guru', '香菇肉碎面': 'https://lh3.googleusercontent.com/pw/AP1GczPRrBESQHr4MjJaDdiXYFda03b72aUrxqrO--coLUrariBXksy0KTPNNaXhzOmmrVhkbChOGKQFqiR8zRRcPZWSd7Hk-inOhSXStOXgC8d0a85lycU=w2400?source=screenshot.guru', '招牌面': 'https://lh3.googleusercontent.com/pw/AP1GczOVfyFF0BVjs49utoC4oxktdqpCblSROVp-z7A0aH5pjECVNDmcaKulF2YA7DBUEDZxzEij53427j1LqfZYPzUSFGdUM2_Zt-aYxIYJY40qAfH5wq8=w2400?source=screenshot.guru' },
        noodleTypeImgs: { '面薄': 'https://lh3.googleusercontent.com/pw/AP1GczPTdYtkKQVVtu2xC4GqatBEs58tYr0xrU6-P08JGLPXNa9URyrd85OABGJvhRRywZqI_6ILtjozkyDCPJWyfo34-z3KP5EPG56bOb6S73_130W3J00=w2400?source=screenshot.guru', '幼面': 'https://lh3.googleusercontent.com/pw/AP1GczNzHJopdj33Emt-5K2nGrlY8AQRwcGxsmIGUyy2dzSKyFYLHxqH-tz7bIRoqlVFfxfetpW7bKNjWvenQuHQ1oPEWLa8r0Zv98IXzUaIhJlRpdNaMJU=w2400?source=screenshot.guru' },
        sauces: ['辣椒', '少辣', '茄汁', '黑醬油', '白醬青', '醋', '湯麵'],
        noExtraImgs: { '肉碎': 'https://i.ibb.co/676LvDVq/Gemini-Generated-Image-o7imd3o7imd3o7im.png', '蔥': 'https://i.ibb.co/VWF95cZS/Gemini-Generated-Image-bfrir0bfrir0bfri.png' },
        additionsImgs: { '魚圓': 'https://lh3.googleusercontent.com/pw/AP1GczOoXizYOs7TlJVh_ikXpPT_8uSFOyH2mnDMFvu2CIFXpJVYqNssfvAbgkwksOqIi89J0NAktQdtJStc5KB6YPkxqk0ccWLkjKAGWKILKERYMt_PYsI=w2400?source=screenshot.guru' }
    };

    let userLang = 'zh'; // 預設語言
    let cart = [], session = { category: '', sequence: [], currentIdx: 0 }, mainCounts = {}; 
    let tempItem = { mainKey:'', sizeKey:'', noodleKey: '', sauceKeys: [], noExtraKeys: [], additionKeys: {}, price: 0 };
    let savedDevice = null, savedChar = null;

    // 1. 選擇語言並切換 UI 文字
    function selectLanguage(lang) {
        userLang = lang;
        const u = dictionary.ui[lang];
        document.getElementById('t-cat-soup').innerText = u.cat_soup;
        document.getElementById('t-cat-noodle').innerText = u.cat_noodle;
        document.getElementById('t-select-food').innerText = u.select_food;
        document.getElementById('t-select-noodle').innerText = u.select_noodle;
        document.getElementById('t-select-sauce').innerText = u.select_sauce;
        document.getElementById('t-select-no').innerText = u.select_no;
        document.getElementById('t-select-add').innerText = u.select_add;
        document.getElementById('t-cart-title').innerText = u.cart_title;
        document.getElementById('t-total').innerText = u.total;
        document.getElementById('btn-next-assign').innerText = u.next;
        document.getElementById('btn-sauce-next').innerText = u.next;
        document.getElementById('btn-no-next').innerText = u.next;
        document.getElementById('btn-confirm-item').innerText = u.confirm;
        document.getElementById('btn-clear').innerText = u.clear;
        document.getElementById('btn-continue').innerText = u.continue;
        document.getElementById('printBtn').innerText = u.print;
        goNext('step-start');
    }

    // 取得物品名稱 (根據語言)
    function getItemName(key, lang = userLang) {
        return (dictionary.items[key] && dictionary.items[key][lang]) ? dictionary.items[key][lang] : key;
    }

    function goNext(id) { document.querySelectorAll('.step').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
    
    function setCategory(v) { 
        session.category = v; 
        if (v === '湯') { renderSoupList(); goNext('step-soup-select'); } 
        else { renderFoodList(); goNext('step-food-select'); } 
    }

    // 動態生成列表 (使用字典)
    function renderFoodList() {
        const cont = document.getElementById('grid-foodItems'); cont.innerHTML = '';
        Object.keys(config.foodImgs).forEach(key => {
            const div = document.createElement('div'); div.className = 'opt';
            div.innerHTML = `<div class="img-box"><div class="price-circle">$${config.prices[key]}</div><img src="${config.foodImgs[key]}"></div><span>${getItemName(key)}</span>
            <div class="qty-input-overlay" onclick="event.stopPropagation()">
                <div class="qty-row">${getItemName('小的')}<div class="qty-btn-group"><button class="qty-btn" onclick="changeMainQty('${key}','小的',-1)">-</button><span class="qty-val" id="ms-${key}">0</span><button class="qty-btn" onclick="changeMainQty('${key}','小的',1)">+</button></div></div>
                <div class="qty-row">${getItemName('大的')}<div class="qty-btn-group"><button class="qty-btn" onclick="changeMainQty('${key}','大的',-1)">-</button><span class="qty-val" id="ml-${key}">0</span><button class="qty-btn" onclick="changeMainQty('${key}','大的',1)">+</button></div></div>
            </div>`;
            cont.appendChild(div);
        });
    }

    function changeMainQty(n, s, d) { const k = `${n}-${s}`; mainCounts[k] = Math.max(0, (mainCounts[k] || 0) + d); document.getElementById(s==='小的'?`ms-${n}`:`ml-${n}`).innerText = mainCounts[k]; }

    function checkFoodFlow() {
        session.sequence = [];
        Object.entries(mainCounts).forEach(([k, v]) => { if (v > 0) { const [n, s] = k.split('-'); for(let i=0; i<v; i++) session.sequence.push({ name: n, size: s }); } });
        if (session.sequence.length === 0) return alert("Please select qty");
        session.currentIdx = 0; renderNoodleTypeList(); startItemProcess();
    }

    function startItemProcess() {
        const cur = session.sequence[session.currentIdx];
        document.getElementById('assign-title').innerHTML = `${getItemName(cur.name)} [${getItemName(cur.size)}] (${session.currentIdx+1}/${session.sequence.length})`;
        tempItem.mainKey = cur.name; tempItem.sizeKey = cur.size;
        goNext('step-noodle-type');
    }

    function renderNoodleTypeList() {
        const cont = document.getElementById('grid-noodleType'); cont.innerHTML = '';
        Object.entries(config.noodleTypeImgs).forEach(([key, img]) => {
            const div = document.createElement('div'); div.className = 'opt';
            div.innerHTML = `<div class="img-box"><img src="${img}"></div><span>${getItemName(key)}</span>`;
            div.onclick = () => { tempItem.noodleKey = key; startSauceStep(); };
            cont.appendChild(div);
        });
    }

    function startSauceStep() {
        tempItem.sauceKeys = []; tempItem.noExtraKeys = []; tempItem.additionKeys = {};
        tempItem.price = config.prices[tempItem.mainKey] + config.prices[tempItem.sizeKey];
        const cont = document.getElementById('sauce-cont'); cont.innerHTML = '';
        config.sauces.forEach(key => {
            const btn = document.createElement('button'); btn.className = 'sauce-btn';
            btn.innerText = getItemName(key);
            btn.onclick = () => { if(tempItem.sauceKeys.includes(key)) tempItem.sauceKeys = tempItem.sauceKeys.filter(x=>x!==key); else tempItem.sauceKeys.push(key); btn.classList.toggle('selected'); };
            cont.appendChild(btn);
        });
        goNext('step-sauce-select');
    }

    function checkSauceFlow() { 
        if(tempItem.sauceKeys.length === 0) return alert("Select Sauce"); 
        renderNoExtraList(); 
        goNext('step-no-extra'); 
    }

    function renderNoExtraList() {
        const cont = document.getElementById('grid-noExtra'); cont.innerHTML = '';
        Object.entries(config.noExtraImgs).forEach(([key, img]) => {
            const div = document.createElement('div'); div.className = 'opt';
            div.innerHTML = `<div class="img-box"><img src="${img}"></div><span>${getItemName(key)}</span>`;
            div.onclick = () => { div.classList.toggle('selected'); if(tempItem.noExtraKeys.includes(key)) tempItem.noExtraKeys = tempItem.noExtraKeys.filter(x=>x!==key); else tempItem.noExtraKeys.push(key); };
            cont.appendChild(div);
        });
        renderAddList();
    }

    function renderAddList() {
        const cont = document.getElementById('grid-additions'); cont.innerHTML = '';
        Object.entries(config.additionsImgs).forEach(([key, img]) => {
            const div = document.createElement('div'); div.className = 'opt';
            div.innerHTML = `<div class="img-box"><img src="${img}"></div><span>${getItemName(key)}</span>`;
            div.onclick = () => { tempItem.additionKeys[key] = (tempItem.additionKeys[key] || 0) + 1; alert(getItemName(key) + " added"); };
            cont.appendChild(div);
        });
    }

    function confirmOneItem() {
        cart.push({ ...tempItem, cartQty: 1 });
        session.currentIdx++;
        if(session.currentIdx < session.sequence.length) startItemProcess();
        else { renderFinalCart(); goNext('step-finish'); }
    }

    function updateCartItemQty(idx, delta) {
        if (delta === -1 && cart[idx].cartQty === 1) {
            if (!confirm(dictionary.ui[userLang].cancel_confirm)) return;
            cart.splice(idx, 1);
        } else { cart[idx].cartQty += delta; }
        renderFinalCart();
    }

    function renderFinalCart() {
        const cont = document.getElementById('cart-list-cont'); let total = 0;
        cont.innerHTML = cart.map((item, idx) => {
            const itemTotal = item.price * item.cartQty; total += itemTotal;
            return `<div style="border-bottom:1px solid #eee; padding:10px 0;">
                <div style="display:flex; justify-content:space-between; font-weight:900;">
                    <span>${getItemName(item.mainKey)} [${getItemName(item.sizeKey)}]</span>
                    <span>$${itemTotal.toFixed(2)}</span>
                </div>
                <div style="font-size:0.85rem; color:#666;">${getItemName(item.noodleKey)} / ${item.sauceKeys.map(k=>getItemName(k)).join(',')}</div>
                <div class="cart-controls">
                    <button class="cart-qty-btn" onclick="updateCartItemQty(${idx},-1)">-</button>
                    <span style="font-weight:900;">${item.cartQty}</span>
                    <button class="cart-qty-btn" onclick="updateCartItemQty(${idx},1)">+</button>
                </div>
            </div>`;
        }).join('');
        document.getElementById('cart-total-sum').innerText = total.toFixed(2);
    }

    // 2. 藍牙列印 (包含詢問語言邏輯)
    async function finalizePrint() {
        if(cart.length === 0) return;
        
        let printLang = 'zh'; // 預設印中文
        if (userLang === 'en') {
            // 如果介面是英文，詢問要印哪種語言
            const choice = confirm(dictionary.ui.en.print_ask);
            printLang = choice ? 'en' : 'zh';
        }

        try {
            document.getElementById('status').innerText = "PRINTING...";
            if(!savedChar) {
                savedDevice = await navigator.bluetooth.requestDevice({ acceptAllDevices: true, optionalServices: ['0000ffe0-0000-1000-8000-00805f9b34fb'] });
                const server = await savedDevice.gatt.connect();
                const service = await server.getPrimaryService('0000ffe0-0000-1000-8000-00805f9b34fb');
                const char = await service.getCharacteristics();
                savedChar = char.find(c => c.properties.writeWithoutResponse) || char.find(c => c.properties.write);
            }

            const canvas = document.getElementById('printCanvas'); const ctx = canvas.getContext('2d');
            let printList = []; cart.forEach(item => { for(let i=0; i<item.cartQty; i++) printList.push(item); });
            canvas.height = 300 + (printList.length * 150);
            ctx.fillStyle = "white"; ctx.fillRect(0,0,384,canvas.height); ctx.fillStyle = "black"; ctx.textAlign = "center";
            ctx.font = "bold 24px sans-serif"; ctx.fillText("Million Gold Bowl", 192, 30);
            ctx.textAlign = "right"; let y = 100;

            printList.forEach((item, idx) => {
                ctx.font = "bold 30px sans-serif";
                ctx.fillText(`${idx+1}. ${getItemName(item.mainKey, printLang)} (${getItemName(item.sizeKey, printLang)})`, 370, y); y+=40;
                ctx.font = "24px sans-serif";
                ctx.fillText(`${getItemName(item.noodleKey, printLang)} / ${item.sauceKeys.map(k=>getItemName(k, printLang)).join(',')}`, 370, y); y+=60;
            });

            // ... (藍牙數據發送邏輯與 ver 3.2.4 相同)
            alert("Printing in " + (printLang === 'en' ? "English" : "Chinese"));
            document.getElementById('status').innerText = "SUCCESS";
            setTimeout(() => location.reload(), 1500);

        } catch (e) { alert(e.message); }
    }
</script>
</body>
</html>
