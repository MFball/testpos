<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Million 廚房接收與列印中心</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 20px; background: #f4f6f9; color: #333; }
        .header { background: #1a73e8; color: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; text-align: center; }
        .status-box { background: white; padding: 15px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 2px 6px rgba(0,0,0,0.05); }
        .btn { background: #34a853; color: white; border: none; padding: 12px 20px; border-radius: 8px; font-size: 1rem; font-weight: bold; cursor: pointer; margin-right: 10px; }
        .btn-blue { background: #1a73e8; }
        .order-card { background: white; padding: 20px; border-radius: 12px; margin-bottom: 15px; border-left: 8px solid #ff9800; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .order-title { font-size: 1.4rem; font-weight: bold; color: #d32f2f; margin-bottom: 10px; }
        .item-list { background: #fafafa; padding: 10px; border-radius: 8px; margin: 10px 0; font-size: 1.1rem; }
    </style>
</head>
<body>

    <div class="header">
        <h1>🍳 廚房接單與自動列印中心</h1>
        <p>請保持此頁面開啟，並連接藍牙印表機</p>
    </div>

    <div class="status-box">
        <h3>📱 藍牙印表機狀態：<span id="bt-status" style="color:red;">未連接</span></h3>
        <button class="btn btn-blue" onclick="connectPrinter()">📡 連接藍牙印表機</button>
        <button class="btn" onclick="testSound()">🔔 測試提示音</button>
    </div>

    <h2>📥 即時收到的新訂單：</h2>
    <div id="orders-list">
        <p style="color:#888;">正在等待新訂單進入...</p>
    </div>

    <!-- 提示音音效 -->
    <audio id="notice-sound" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" preload="auto"></audio>

    <!-- 導入 Firebase 監聽模組 -->
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
      import { getDatabase, ref, onChildAdded } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

      // 你專屬的 Firebase 設定
      const firebaseConfig = {
        databaseURL: "https://million-fishballnoodle-backend-default-rtdb.asia-southeast1.firebasedatabase.app"
      };

      const app = initializeApp(firebaseConfig);
      const db = getDatabase(app);
      const ordersRef = ref(db, 'orders');

      let isFirstLoad = true;
      
      // 頁面打開後，開始實時監聽資料庫
      setTimeout(() => { isFirstLoad = false; }, 3000); // 避開載入舊資料時狂響

      onChildAdded(ordersRef, (snapshot) => {
          const order = snapshot.val();
          
          // 在畫面上印出這張單
          renderOrderCard(order);

          // 如果是剛進來的新訂單，就響鈴
          if (!isFirstLoad) {
    playNoticeSound();
    // 🖨️ 新訂單進來，立刻呼叫自動列印！
    if (typeof autoPrintOrder === 'function') {
        autoPrintOrder(order);
    }
}
      });

      // 在畫面上呈現訂單卡片
      function renderOrderCard(order) {
          const listDiv = document.getElementById('orders-list');
          
          // 如果是第一筆，把預設的「正在等待...」文字掉
          if (listDiv.innerText.includes('正在等待')) {
              listDiv.innerHTML = '';
          }

          let itemsHtml = order.items.map(item => `
              <div style="display:flex; justify-shadow:space-between; margin-bottom:5px;">
                  <span><b>${item.name}</b> x ${item.qty}</span>
                  <span>$${item.price * item.qty}</span>
              </div>
          `).join('');

          const card = document.createElement('div');
          card.className = 'order-card';
          card.innerHTML = `
              <div class="order-title">單號：No. ${order.orderNo} (${order.diningOption})</div>
              <div><b>時間：</b>${order.timeStr || '未知'}</div>
              <div class="item-list">${itemsHtml}</div>
              <div style="text-align:right; font-size:1.2rem; font-weight:bold; color:#1a73e8;">
                  總金額：$${order.totalPrice}
              </div>
          `;

          // 新的訂單放在最上面
          listDiv.prepend(card);
      }
    </script>

    <script>
      // 測試聲音
      function testSound() {
          const audio = document.getElementById('notice-sound');
          audio.play().catch(e => alert("請先點擊頁面任何地方以允許播放聲音！"));
      }

      let printDevice = null;
let printServer = null;
let printCharacteristic = null;

// 📡 1. 連接藍牙印表機
async function connectPrinter() {
    try {
        const btStatus = document.getElementById('bt-status');
        btStatus.innerText = "搜尋中...";
        
        printDevice = await navigator.bluetooth.requestDevice({
            acceptAllDevices: true,
            optionalServices: ['000018f0-0000-1000-8000-00805f9b34fb', 'e7810a71-73ae-499d-8c15-faa9aef0c3f2']
        });

        printServer = await printDevice.gatt.connect();
        
        // 尋找服務與特徵值 (搜尋列印服務)
        const services = await printServer.getPrimaryServices();
        for (let service of services) {
            const characteristics = await service.getCharacteristics();
            for (let char of characteristics) {
                if (char.properties.write || char.properties.writeWithoutResponse) {
                    printCharacteristic = char;
                    break;
                }
            }
            if (printCharacteristic) break;
        }

        if (printCharacteristic) {
            btStatus.innerText = "已連線 🟢";
            btStatus.style.color = "green";
            alert("✅ 藍牙印表機連接成功！");
        } else {
            throw new Error("找不到可寫入的藍牙頻道");
        }
    } catch (err) {
        console.error(err);
        document.getElementById('bt-status').innerText = "未連接 🔴";
        document.getElementById('bt-status').style.color = "red";
        alert("❌ 連接失敗：" + err.message);
    }
}

// 🖨️ 2. 收到訂單時自動列印的函數
async function autoPrintOrder(order) {
    if (!printCharacteristic) {
        console.log("印表機未連接，跳過自動列印");
        return;
    }

    try {
        // 使用您原本 Ver 5.3.5 的小票格式打包文字
        let text = `\n==============================\n`;
        text += `       MILLION FISHBALL       \n`;
        text += `==============================\n`;
        text += `單號 No.: ${order.orderNo}\n`;
        text += `類型: ${order.diningOption}\n`;
        text += `時間: ${order.timeStr || ''}\n`;
        text += `------------------------------\n`;
        
        order.items.forEach(item => {
            text += `${item.name}\n`;
            text += `  x${item.qty}   $${item.price * item.qty}\n`;
        });
        
        text += `------------------------------\n`;
        text += `總計 Total: $${order.totalPrice}\n`;
        text += `==============================\n\n\n\n`;

        // 將文字轉為 Big5 / GBK / UTF-8 編碼發送到印表機
        const encoder = new TextEncoder();
        const data = encoder.encode(text);
        
        // 分段發送給藍牙
        const chunkSize = 20;
        for (let i = 0; i < data.length; i += chunkSize) {
            const chunk = data.slice(i, i + chunkSize);
            await printCharacteristic.writeValue(chunk);
        }
        console.log("✅ 訂單已自動列印完成！");
    } catch (err) {
        console.error("列印失敗:", err);
    }
}
    </script>
</body>
</html>
